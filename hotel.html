<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMARTEST GUIDE – Správa hotelu</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
  --bg:#ffffff;--bg2:#faf9f5;--bg3:#f7f6f4;
  --ink:#1a1a1a;--ink2:#4a4a4a;--border:#e8e4dc;
  --muted:#6b6b6b;--text:#1a1a1a;--dim:#6b6b6b;
  --teal:#00d4aa;--teal-light:rgba(0,212,170,.08);
  --accent:#FF6B00;--accent2:#00d4aa;
  --gold:#FF6B00;--gold-light:rgba(255,107,0,.08);
  --surface:#ffffff;--surface2:#faf9f5;
  --font-head:'Syne',sans-serif;--font-body:'Inter',sans-serif;
}
/* Portál zůstává vždy světlý (nezávisle na systémovém tmavém režimu) */
html{color-scheme:light}
/* Zvýraznění vybrané (otevřené) sekce — jemné šedé pozadí + oranžový pruh vlevo */
.section.section-open{background:rgba(120,120,120,.08);box-shadow:inset 3px 0 0 var(--accent);border-color:var(--accent)}
.section-toggle-lbl{font-size:11px;color:var(--muted);margin:0 4px;white-space:nowrap;user-select:none}
/* Sidebar strom — každá položka na 1 řádek */
#portal-sidebar a{white-space:nowrap;overflow:hidden}
/* Restaurace ve dvou sloupcích (na mobilu 1) */
#restaurants-list{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
@media(max-width:760px){#restaurants-list{grid-template-columns:1fr}}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.6;min-height:100vh}

    /* Top bar */
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .logo{font-family:var(--font-head);font-size:16px;font-weight:700}
    .logo span{color:var(--accent)}
    .hotel-name-bar{font-size:13px;color:var(--muted)}
    .hotel-name-bar strong{color:var(--text)}
    .save-bar{display:flex;align-items:center;gap:12px}
    .unsaved-dot{width:8px;height:8px;border-radius:50%;background:var(--warn);display:none}
    .unsaved-dot.show{display:block}

    /* Layout */
    .container{max-width:100%;margin:0;padding:24px 32px}

    /* Sekce – accordion */
    .section{margin-bottom:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .section-head{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .15s}
    .section-head:hover{background:rgba(255,107,0,.06)}
    .section-head.open{border-bottom:1px solid var(--border)}
    .section-icon{font-size:18px;width:34px;height:34px;background:rgba(255,107,0,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .section-title{font-family:var(--font-head);font-size:14px;font-weight:600}
    .section-desc{font-size:11px;color:var(--muted);margin-top:1px}
    .section-chevron{margin-left:auto;font-size:12px;color:var(--muted);transition:transform .2s;flex-shrink:0}
    .section-chevron.open{transform:rotate(180deg)}
    .section-score{margin-left:8px;flex-shrink:0}
    .score-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
    .score-badge.full{background:rgba(46,204,135,.15);color:#2ecc87;border:1px solid rgba(46,204,135,.3)}
    .score-badge.partial{background:rgba(255,170,51,.15);color:#ffaa33;border:1px solid rgba(255,170,51,.3)}
    .score-badge.empty{background:rgba(255,79,106,.1);color:#ff4f6a;border:1px solid rgba(255,79,106,.2)}
    .section-body{display:none;padding:16px 18px}
    .section-body.open{display:block}

    /* Editovatelná tabulka */
    .edit-table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .edit-table tr{border-bottom:1px solid rgba(42,47,74,.7)}
    .edit-table tr:last-child{border-bottom:none}
    .edit-table tr:hover{background:rgba(255,107,0,.03)}
    .edit-table td:first-child{width:180px;padding:12px 16px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600;vertical-align:top;padding-top:14px}
    .edit-table td:last-child{padding:8px 12px 8px 0}

    input[type=text],input[type=number],input[type=email],input[type=tel],textarea{
      background:transparent;border:1px solid transparent;border-radius:6px;color:var(--text);
      font-family:var(--font-body);font-size:13px;padding:6px 10px;width:100%;outline:none;
      transition:all .15s;
    }
    input:hover,textarea:hover{border-color:var(--border);background:var(--surface)}
    input:focus,textarea:focus{border-color:var(--accent);background:var(--surface)}
    textarea{resize:vertical;min-height:70px}

    /* Tags input */
    .tags-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:6px 10px;border:1px solid transparent;border-radius:6px;min-height:40px;cursor:text;transition:all .15s}
    .tags-wrap:hover{border-color:var(--border);background:var(--surface)}
    .tags-wrap:focus-within{border-color:var(--accent);background:var(--surface)}
    .tag-item{background:rgba(255,107,0,.15);color:var(--accent);border:1px solid rgba(255,107,0,.3);border-radius:20px;padding:3px 10px;font-size:12px;display:flex;align-items:center;gap:6px;white-space:nowrap}
    .tag-item button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;line-height:1;padding:0;opacity:.7}
    .tag-item button:hover{opacity:1}
    .tag-input{border:none;background:transparent;color:var(--text);font-size:12px;outline:none;min-width:120px;padding:3px 4px}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
    .btn-primary{background:var(--accent);color:#ffffff;font-weight:700} .btn-primary:hover{background:#e05e00;color:#ffffff}
    .btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)} .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    /* Status badge */
    .status-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}
    .status-pill.active{background:rgba(46,204,135,.12);color:var(--success);border:1px solid rgba(46,204,135,.3)}
    .status-pill.inactive{background:rgba(122,127,168,.12);color:var(--muted);border:1px solid rgba(122,127,168,.3)}

    /* Info banner */
    .info-banner{background:rgba(255,107,0,.08);border:1px solid rgba(255,107,0,.2);border-radius:10px;padding:14px 18px;font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.7}
    .info-banner strong{color:var(--text)}

    /* Error/success */
    .page-msg{text-align:center;padding:80px 20px}
    .page-msg h2{font-family:var(--font-head);font-size:22px;margin-bottom:10px}
    .page-msg p{color:var(--muted);font-size:14px}

    /* Toast */
    #portal-sidebar a{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:13px;color:var(--muted);text-decoration:none;border-left:2px solid transparent;transition:all .15s;cursor:pointer}
    #portal-sidebar a:hover{color:var(--text);background:rgba(255,107,0,.06)}
    #portal-sidebar a.active{color:var(--accent);border-left-color:var(--accent);background:rgba(255,107,0,.08);font-weight:600}
    #portal-sidebar .sidebar-section{padding:12px 16px 4px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-top:8px}
    #portal-sidebar a{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:13px;color:var(--muted);text-decoration:none;border-left:2px solid transparent;transition:all .15s;cursor:pointer}
    #portal-sidebar a:hover{color:var(--text);background:rgba(255,107,0,.06)}
    #portal-sidebar a.active{color:var(--accent);border-left-color:var(--accent);background:rgba(255,107,0,.08);font-weight:600}
    #portal-sidebar .sidebar-section{padding:12px 16px 4px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-top:8px}
    #toast{position:fixed;bottom:28px;right:28px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;font-size:13px;display:none;z-index:999;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
    #toast.show{display:block} #toast.ok{border-color:var(--success)} #toast.err{border-color:var(--danger)} #toast.warn{border-color:var(--warn)}

    /* Loader */
    .loader{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Last saved */
    .last-saved{font-size:11px;color:var(--muted)}
  .plang-btn{background:none;border:none;color:var(--muted);font-size:11px;font-weight:700;padding:4px 7px;border-radius:5px;cursor:pointer;transition:all .15s}
.plang-btn.active{background:var(--accent);color:#ffffff;font-weight:700}
</style>
</head>
<body>
<div style="position:fixed;top:0;left:0;right:0;height:3px;z-index:200;background:linear-gradient(90deg,#00d4aa 0%,#00d4aa 60%,#FF6B00 100%);box-shadow:0 0 10px rgba(0,212,170,.35)"></div>
<div style="position:fixed;top:0;left:0;right:0;height:3px;z-index:9999;background:linear-gradient(90deg,#00d4aa,#00d4aa 60%,#FF6B00);box-shadow:0 0 10px rgba(0,212,170,.3)"></div>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:16px">
    <div class="logo">SMARTEST GUIDE<span style="width:6px;height:6px;border-radius:50%;background:#FF6B00;display:inline-block;margin-left:3px;margin-bottom:1px;box-shadow:0 0 6px rgba(255,107,0,.8)"></span></div>
    <div class="hotel-name-bar">Správa hotelu: <strong id="hotel-name-bar">–</strong></div>
  </div>
  <div class="save-bar">
    <span class="last-saved" id="last-saved"></span>
    <span class="unsaved-dot" id="unsaved-dot"></span>
    <button class="btn btn-primary" id="save-btn" onclick="saveAll()" disabled>💾 Uložit změny</button>
  </div>
</div>

<div style="display:flex;min-height:calc(100vh - 60px)">

<!-- Sidebar navigace -->
<div id="portal-sidebar" style="width:280px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto">
  <div style="padding:0 16px;margin-bottom:8px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600">Sekce</div>
  <div id="sidebar-nav"></div>
</div>

<!-- Hlavní obsah -->
<div style="flex:1;min-width:0;overflow-y:auto">
<div class="container" id="completeness-banner" style="max-width:100%;margin:16px 0 0;padding:0 32px"></div>

<div class="container" style="max-width:100%;padding:10px 32px 0;display:flex;justify-content:flex-end;gap:8px">
  <button class="btn btn-secondary" style="font-size:12px;padding:6px 14px" onclick="setAllSections(true)">⊞ Rozbalit vše</button>
  <button class="btn btn-secondary" style="font-size:12px;padding:6px 14px" onclick="setAllSections(false)">⊟ Sbalit vše</button>
</div>

<div class="container" id="main-container">
  <div class="page-msg"><div class="loader"></div><p style="margin-top:16px;color:var(--muted)">Načítám data hotelu…</p></div>
</div>

</div><!-- /hlavní obsah -->
</div><!-- /flex wrapper -->

<div id="toast"></div>

<script>
const API = '';
const token = new URLSearchParams(location.search).get('token');
let hotelData = null;
let hasChanges = false;

// ── Překlady portálu ─────────────────────────
const PORTAL_T = {
  cs:{
    title:"Hotelový portál",save:"Uložit změny",saving:"Ukládám...",saved:"Změny uloženy",
    cancel_sub:"Zrušit předplatné",cancel_confirm:"Opravdu zrušit předplatné?",
    pay_btn:"Zaplatit online",pay_active:"Předplatné aktivní",
    invoices:"Faktury",analytics:"Statistiky chatbota",embed:"Embed widget",
    no_invoices:"Žádné faktury",pdf:"PDF",logout:"Odhlásit",
  },
  en:{
    title:"Hotel Portal",save:"Save changes",saving:"Saving...",saved:"Changes saved",
    cancel_sub:"Cancel subscription",cancel_confirm:"Really cancel subscription?",
    pay_btn:"Pay online",pay_active:"Subscription active",
    invoices:"Invoices",analytics:"Chatbot statistics",embed:"Embed widget",
    no_invoices:"No invoices",pdf:"PDF",logout:"Logout",
  },
  de:{
    title:"Hotelportal",save:"Änderungen speichern",saving:"Speichere...",saved:"Änderungen gespeichert",
    cancel_sub:"Abo kündigen",cancel_confirm:"Abo wirklich kündigen?",
    pay_btn:"Online bezahlen",pay_active:"Abonnement aktiv",
    invoices:"Rechnungen",analytics:"Chatbot-Statistiken",embed:"Einbetten",
    no_invoices:"Keine Rechnungen",pdf:"PDF",logout:"Abmelden",
  },
  es:{
    title:"Portal del hotel",save:"Guardar cambios",saving:"Guardando...",saved:"Cambios guardados",
    cancel_sub:"Cancelar suscripción",cancel_confirm:"¿Cancelar suscripción?",
    pay_btn:"Pagar en línea",pay_active:"Suscripción activa",
    invoices:"Facturas",analytics:"Estadísticas del chatbot",embed:"Insertar widget",
    no_invoices:"Sin facturas",pdf:"PDF",logout:"Cerrar sesión",
  },
  pl:{
    title:"Portal hotelowy",save:"Zapisz zmiany",saving:"Zapisuję...",saved:"Zmiany zapisane",
    cancel_sub:"Anuluj subskrypcję",cancel_confirm:"Anulować subskrypcję?",
    pay_btn:"Zapłać online",pay_active:"Subskrypcja aktywna",
    invoices:"Faktury",analytics:"Statystyki chatbota",embed:"Osadź widget",
    no_invoices:"Brak faktur",pdf:"PDF",logout:"Wyloguj",
  },
  it:{
    title:"Portale hotel",save:"Salva modifiche",saving:"Salvataggio...",saved:"Modifiche salvate",
    cancel_sub:"Annulla abbonamento",cancel_confirm:"Annullare abbonamento?",
    pay_btn:"Paga online",pay_active:"Abbonamento attivo",
    invoices:"Fatture",analytics:"Statistiche chatbot",embed:"Incorpora widget",
    no_invoices:"Nessuna fattura",pdf:"PDF",logout:"Esci",
  },
};

let portalLang = localStorage.getItem('sg_portal_lang') || 'cs';

function setPortalLang(lang){
  portalLang = lang;
  localStorage.setItem('sg_portal_lang', lang);
  document.querySelectorAll('.plang-btn').forEach(b => {
    b.classList.toggle('active', b.id === 'plb-'+lang);
  });
  // Znovu renderuj portál s novým jazykem
  if(hotelData) renderPortal();
}

function t(key){ return (PORTAL_T[portalLang]||PORTAL_T.cs)[key] || key; }

// ── Init ──────────────────────────────────────
// Nastav výchozí jazyk přepínače
document.querySelectorAll('.plang-btn').forEach(b => {
  b.classList.toggle('active', b.id === 'plb-'+portalLang);
});

if (!token) {
  document.getElementById('main-container').innerHTML = `
    <div class="page-msg">
      <h2>⛔ Přístup odepřen</h2>
      <p>Tento odkaz není platný. Požádej správce SMARTEST GUIDE o nový přístupový odkaz.</p>
    </div>`;
} else {
  loadHotel();
}

async function loadHotel() {
  try {
    const r = await fetch(`${API}/api/hotel-portal/me?token=${token}`);
    if (!r.ok) throw new Error('Neplatný token');
    const d = await r.json();
    hotelData = d.hotel;
    await loadPricing();
    renderPortal();
    loadCompleteness();
    loadPaymentSection();
    loadInvoicesSection();
    loadAnalytics();
    setTimeout(initEmbedCode, 100);
  } catch(e) {
    document.getElementById('main-container').innerHTML = `
      <div class="page-msg">
        <h2>⛔ Přístup odepřen</h2>
        <p>${e.message === 'Neplatný token' ? 'Tento přístupový odkaz není platný nebo byl zrušen.' : 'Nelze se připojit k serveru. Ujisti se, že aplikace běží.'}</p>
      </div>`;
  }
}

async function loadCompleteness() {
  try {
    const r = await fetch(`${API}/api/hotel-portal/completeness?token=${token}`);
    if (!r.ok) return;
    const d = await r.json();
    renderCompleteness(d);
  } catch(e) {}
}

function renderCompleteness(d) {
  const el = document.getElementById('completeness-banner');
  if (!el) return;
  const score = d.score || 0;
  const color = score >= 80 ? '#2ecc87' : score >= 50 ? '#ffaa33' : '#ff4f6a';
  const emoji = score >= 80 ? '🟢' : score >= 50 ? '🟡' : '🔴';
  const missingReq = d.missing_required || [];
  const missingBonus = d.missing_bonus || [];

  let motivText = '';
  if (score < 80) {
    motivText = `<div style="margin-top:12px;padding:12px 14px;background:rgba(255,170,51,.08);border:1px solid rgba(255,170,51,.3);border-radius:8px;font-size:13px">
      <strong style="color:var(--warn)">⚠️ Profil není kompletní – hosté mohou dostávat neúplné odpovědi!</strong>
      ${missingReq.length ? `<div style="margin-top:8px;color:var(--muted)">Chybí povinná pole: <strong style="color:var(--text)">${missingReq.join(', ')}</strong></div>` : ''}
    </div>`;
  } else if (missingBonus.length) {
    motivText = `<div style="margin-top:12px;padding:12px 14px;background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.2);border-radius:8px;font-size:13px;color:var(--muted)">
      💡 Tip: Doplňte <strong style="color:var(--text)">${missingBonus.slice(0,3).join(', ')}</strong> pro ještě lepší odpovědi Alexe.
    </div>`;
  } else {
    motivText = `<div style="margin-top:12px;font-size:13px;color:var(--success)">✅ Skvělé! Profil je kompletně vyplněn.</div>`;
  }

  _sectionIdx = 0;
  el.innerHTML = `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:14px;font-weight:600">${emoji} Vyplněnost profilu hotelu</div>
        <div style="font-family:var(--font-head);font-size:24px;font-weight:700;color:${color}">${score}%</div>
      </div>
      <div style="background:var(--border);border-radius:6px;height:10px;overflow:hidden">
        <div style="background:${color};height:100%;border-radius:6px;width:${score}%;transition:width .6s ease"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted)">
        <span>Základní údaje: ${d.filled_required}/${d.total_required}</span>
        <span>Bonusové údaje: ${d.filled_bonus}/${d.total_bonus}</span>
      </div>
      ${motivText}
    </div>`;
}

// ── Render ────────────────────────────────────
function renderPortal() {
  const h = hotelData;
  document.getElementById('hotel-name-bar').textContent = h.name || '–';
  document.getElementById('save-btn').disabled = false;

  // Varování pokud chybí počet lůžek
  const bedWarn = document.getElementById('bed-count-warning');
  if (!h.bed_count || h.bed_count < 1) {
    if (!bedWarn) {
      const w = document.createElement('div');
      w.id = 'bed-count-warning';
      w.style.cssText = 'margin:0 0 16px;padding:14px 18px;background:rgba(255,170,51,.1);border:1px solid rgba(255,170,51,.4);border-radius:12px;font-size:13px;display:flex;align-items:center;gap:12px';
      w.innerHTML = '<span style="font-size:20px">⚠️</span><div><strong style="color:#ffaa33">Chybí počet lůžek!</strong><br><span style="color:var(--muted)">Doplňte počet lůžek v sekci Základní provozní informace — jinak nelze správně vypočítat cenu předplatného a AI nemá přesné informace o kapacitě hotelu.</span></div>';
      const container = document.getElementById('main-container');
      if (container) container.prepend(w);
    }
  } else if (bedWarn) {
    bedWarn.remove();
  }

  const lastEdit = h.portal_last_edit
    ? `Naposledy upraveno: ${new Date(h.portal_last_edit).toLocaleString('cs-CZ')}`
    : 'Zatím neupraveno';

  const subStatus = h.subscription_active
    ? '<span class="status-pill active">● Předplatné aktivní</span>'
    : '<span class="status-pill inactive">○ Předplatné neaktivní</span>';

  document.getElementById('main-container').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-family:var(--font-head);font-size:22px;font-weight:700">${esc(h.name||'Bez názvu')}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">${esc(h.url||h.source_url||'')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        ${subStatus}
        <span style="font-size:11px;color:var(--muted)">${lastEdit}</span>
      </div>
    </div>

    <div class="info-banner">

// Accordion sekce se scoring
let _sectionIdx = 0;
let _sectionFields = {}; // uložíme fields pro každou sekci, scoring spočítáme po renderování

function renderSection(icon, title, desc, content, fields, defaultOpen) {
  const id = 'sec-' + (_sectionIdx++);
  // Ulož fields pro pozdější scoring (DOM ještě neexistuje)
  if (fields && fields.length) _sectionFields[id] = fields;
  const isOpen = defaultOpen ? 'open' : '';
  // Placeholder pro score badge – vyplní updateSectionScore() po renderování
  const scorePlaceholder = fields && fields.length
    ? `<span class="section-score" id="score-${id}"><span class="score-badge empty">○ 0%</span></span>`
    : '';
  return `<div class="section ${isOpen ? 'section-open' : ''}" id="${id}">
    <div class="section-head ${isOpen}" onclick="toggleSection('${id}')">
      <div class="section-icon">${icon}</div>
      <div style="flex:1;min-width:0">
        <div class="section-title">${title}</div>

function updateSectionScore(id) {
  const el = document.getElementById('score-' + id);
  if (!el) return;
  const sec = document.getElementById(id);
  const body = sec && sec.querySelector('.section-body');
  if (!body) { el.innerHTML = ''; return; }
  // Spočítej VŠECHNA editovatelná pole v sekci (aby číslo sedělo s řádky)
  let total = 0, filled = 0;
  body.querySelectorAll('input[id^="f-"], textarea[id^="f-"], select[id^="f-"]').forEach(inp => {
    if (inp.type === 'checkbox' || inp.type === 'button' || inp.type === 'hidden') return;
    total++;
    if (String(inp.value || '').trim() !== '') filled++;
  });
  // Tagové skupiny (vybavení, místa v okolí…)
  body.querySelectorAll('[id^="tags-"]').forEach(tc => {
    total++;
    if (tc.querySelectorAll('.tag-item').length > 0) filled++;
  });
  // Opakovatelné restaurace — každá s názvem se počítá jako vyplněná
  body.querySelectorAll('.resto-card').forEach(card => {
    total++;
    const nm = card.querySelector('.r-name');
    if (nm && nm.value.trim()) filled++;
  });
  if (total === 0) { el.innerHTML = ''; return; }
  const pct = Math.round(filled / total * 100);
  // Barvy: 100 % zelená · 80–99 % oranžová · pod 80 % červená
  const cls = pct >= 100 ? 'full' : pct >= 80 ? 'partial' : 'empty';
  const emoji = pct >= 100 ? '✓' : pct >= 80 ? '◑' : '○';
  el.innerHTML = `<span class="score-badge ${cls}" title="Vyplněno ${filled} z ${total} polí">${emoji} ${pct}% <span style="opacity:.65;font-weight:500">(${filled}/${total})</span></span>`;
}

function updateAllSectionScores() {
  Object.keys(_sectionFields).forEach(id => updateSectionScore(id));
  buildSidebarNav();
}

    if (!val) return;
    addTag(key, val);

  if (e.key === 'Backspace' && e.target.value === '') {
    const wrap = document.getElementById('tags-' + key);
    const tags = wrap.querySelectorAll('.tag-item');
    if (tags.length) tags[tags.length-1].remove();

// Cena se načítá z API — neměň ručně
let _pricingBase = 200;
let _pricingThreshold = 100;
let _pricingPerBed = 3;

function calcPrice(beds){
  if(!beds) return _pricingBase;
  return beds <= _pricingThreshold ? _pricingBase : _pricingBase + (beds - _pricingThreshold) * _pricingPerBed;
}

async function loadPricing(){
  try {
    const r = await fetch(`${API}/api/settings`);
    const d = await r.json();
    _pricingBase      = d.pricing_base      || 200;
    _pricingThreshold = d.pricing_threshold || 100;
    _pricingPerBed    = d.pricing_per_bed   || 3;
  } catch(e) { /* fallback na defaults */ }
}

// ── Uložení ───────────────────────────────────
async function saveAll() {
  const numKeys = new Set(['bed_count', 'room_count', 'star_rating']);
  const data = {};
  // Sesbírej VŠECHNA pole f-* genericky (oprava: dřív se ukládala jen ručně vyjmenovaná)
  document.querySelectorAll('input[id^="f-"], textarea[id^="f-"], select[id^="f-"]').forEach(el => {
    if (el.type === 'checkbox' || el.type === 'button' || el.type === 'hidden') return;
    const key = el.id.slice(2);
    const v = String(el.value || '').trim();
    if (numKeys.has(key)) { const n = parseInt(v); data[key] = (v === '' || isNaN(n)) ? null : n; }
    else { data[key] = v || null; }
  });
  data.amenities = getTagValues('amenities');
  data.nearby_places = getTagValues('nearby_places');
  data.hidden_gems = getTagValues('hidden_gems');

  // Opakovatelné restaurace + jídelníky
  const restaurants = collectRestaurants().filter(r => r.name || r.type || r.hours || r.directions || (r.menus && r.menus.length));
  data.restaurants = restaurants;
  // Zpětná kompatibilita (completeness / fallback)
  data.restaurant_name = (restaurants[0] && restaurants[0].name) || null;
  data.nav_restaurant = (restaurants[0] && restaurants[0].directions) || null;
  const allMenus = [];
  restaurants.forEach(r => (r.menus || []).forEach(m => m.url && allMenus.push(m.url)));
  data.menu_urls = allMenus.length ? allMenus : null;

  // Vlastní navigační body
  data.nav_custom = getNavCustomItems().filter(i => i.name || i.desc);

  // Vlastní pole
  const customFields = [];
  let cfIdx = 0;
  while(document.getElementById('cf-label-'+cfIdx)){
    const label = document.getElementById('cf-label-'+cfIdx)?.value.trim();
    const value = document.getElementById('cf-value-'+cfIdx)?.value.trim();
    if(label && value) customFields.push({label, value});
    cfIdx++;
  }
  data.custom_fields = customFields.length ? customFields : null;

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span> Ukládám…';

  try {
    const r = await fetch(`${API}/api/hotel-portal/update?token=${token}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    hotelData = d.hotel;
    hasChanges = false;
    document.getElementById('unsaved-dot').classList.remove('show');
    const now = new Date().toLocaleTimeString('cs-CZ', {hour:'2-digit',minute:'2-digit'});
    document.getElementById('last-saved').textContent = `Uloženo v ${now}`;
    // Okamžitá aktualizace platební sekce a hlavičky bez refreshe
    await loadPaymentSection();
    // Přepočítej completeness skóre
    await loadCompleteness();
    const oldBeds = hotelData.subscription_paid_beds || 0;
    const newBeds = hotelData.bed_count || 0;
    if(hotelData.subscription_active && newBeds > oldBeds && oldBeds > 0){
      toast('⚠️ Počet lůžek zvýšen – vyžadován doplatek!', 'warn');
    } else {
      toast('✅ Změny uloženy!');
    }
  } catch(e) {
    toast('Chyba při ukládání: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '💾 Uložit změny';
  }
}

  }
}

function copyEmbedCode(){
  const el = document.getElementById('embed-code');
  if(!el) return;
  navigator.clipboard.writeText(el.textContent).then(()=>toast('✅ Kód zkopírován!'));
}

function previewWidget(){
  const base = window.location.origin;
  window.open(`${base}/guest/${hotelData.id}`, 'sg_preview', 'width=420,height=700');
}

// ── Zrušení předplatného ─────────────────────
async function cancelSubscription(){
  if(!confirm('Opravdu chcete zrušit předplatné?\n\nPřístup bude deaktivován. Můžete se znovu přihlásit kdykoliv.'))return;
  try{
    const r=await fetch(`${API}/api/hotel-portal/cancel?token=${token}`,{method:'POST'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    hotelData=d.hotel;
    toast('Předplatné zrušeno','warn');
    loadPaymentSection();
  }catch(e){toast('Chyba: '+e.message,'err');}
}

// ── Blokace editace při nedoplatku ───────────
function blockEditing(){
  document.querySelectorAll('input,textarea').forEach(el=>{
    el.disabled=true;
    el.style.opacity='0.4';
    el.style.cursor='not-allowed';
  });
  document.querySelectorAll('.tags-wrap').forEach(el=>{
    el.style.opacity='0.4';
    el.style.pointerEvents='none';
  });
  const btn=document.getElementById('save-btn');
  if(btn){btn.disabled=true;btn.textContent='⚠️ Uhraďte doplatek';}
}

// ── Utils ─────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type='ok'){const e=document.getElementById('toast');e.textContent=msg;e.className='show '+type;setTimeout(()=>e.className='',3500);}
</script>
</body>
</html>
