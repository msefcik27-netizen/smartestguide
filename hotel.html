<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartestGuide – Správa hotelu</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0d0f1a; --surface:#161828; --card:#1e2135; --border:#2a2f4a;
      --accent:#6c63ff; --accent2:#00d4aa; --danger:#ff4f6a;
      --text:#e8eaf6; --muted:#7a7fa8; --success:#2ecc87; --warn:#ffaa33;
      --radius:12px; --font-head:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.6;min-height:100vh}

    /* Top bar */
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .logo{font-family:var(--font-head);font-size:16px;font-weight:700}
    .logo span{color:var(--accent)}
    .hotel-name-bar{font-size:13px;color:var(--muted)}
    .hotel-name-bar strong{color:var(--text)}
    .save-bar{display:flex;align-items:center;gap:12px}
    .unsaved-dot{width:8px;height:8px;border-radius:50%;background:var(--warn);display:none}
    .unsaved-dot.show{display:block}

    /* Layout */
    .container{max-width:860px;margin:0 auto;padding:32px 24px}

    /* Sekce – accordion */
    .section{margin-bottom:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .section-head{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .15s}
    .section-head:hover{background:rgba(108,99,255,.06)}
    .section-head.open{border-bottom:1px solid var(--border)}
    .section-icon{font-size:18px;width:34px;height:34px;background:rgba(108,99,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .section-title{font-family:var(--font-head);font-size:14px;font-weight:600}
    .section-desc{font-size:11px;color:var(--muted);margin-top:1px}
    .section-chevron{margin-left:auto;font-size:12px;color:var(--muted);transition:transform .2s;flex-shrink:0}
    .section-chevron.open{transform:rotate(180deg)}
    .section-score{margin-left:8px;flex-shrink:0}
    .score-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
    .score-badge.full{background:rgba(46,204,135,.15);color:#2ecc87;border:1px solid rgba(46,204,135,.3)}
    .score-badge.partial{background:rgba(255,170,51,.15);color:#ffaa33;border:1px solid rgba(255,170,51,.3)}
    .score-badge.empty{background:rgba(255,79,106,.1);color:#ff4f6a;border:1px solid rgba(255,79,106,.2)}
    .section-body{display:none;padding:16px 18px}
    .section-body.open{display:block}

    /* Editovatelná tabulka */
    .edit-table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .edit-table tr{border-bottom:1px solid rgba(42,47,74,.7)}
    .edit-table tr:last-child{border-bottom:none}
    .edit-table tr:hover{background:rgba(108,99,255,.03)}
    .edit-table td:first-child{width:180px;padding:12px 16px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600;vertical-align:top;padding-top:14px}
    .edit-table td:last-child{padding:8px 12px 8px 0}

    input[type=text],input[type=number],input[type=email],input[type=tel],textarea{
      background:transparent;border:1px solid transparent;border-radius:6px;color:var(--text);
      font-family:var(--font-body);font-size:13px;padding:6px 10px;width:100%;outline:none;
      transition:all .15s;
    }
    input:hover,textarea:hover{border-color:var(--border);background:var(--surface)}
    input:focus,textarea:focus{border-color:var(--accent);background:var(--surface)}
    textarea{resize:vertical;min-height:70px}

    /* Tags input */
    .tags-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:6px 10px;border:1px solid transparent;border-radius:6px;min-height:40px;cursor:text;transition:all .15s}
    .tags-wrap:hover{border-color:var(--border);background:var(--surface)}
    .tags-wrap:focus-within{border-color:var(--accent);background:var(--surface)}
    .tag-item{background:rgba(108,99,255,.15);color:var(--accent);border:1px solid rgba(108,99,255,.3);border-radius:20px;padding:3px 10px;font-size:12px;display:flex;align-items:center;gap:6px;white-space:nowrap}
    .tag-item button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;line-height:1;padding:0;opacity:.7}
    .tag-item button:hover{opacity:1}
    .tag-input{border:none;background:transparent;color:var(--text);font-size:12px;outline:none;min-width:120px;padding:3px 4px}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
    .btn-primary{background:var(--accent);color:#fff} .btn-primary:hover{background:#7c75ff}
    .btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)} .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    /* Status badge */
    .status-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}
    .status-pill.active{background:rgba(46,204,135,.12);color:var(--success);border:1px solid rgba(46,204,135,.3)}
    .status-pill.inactive{background:rgba(122,127,168,.12);color:var(--muted);border:1px solid rgba(122,127,168,.3)}

    /* Info banner */
    .info-banner{background:rgba(108,99,255,.08);border:1px solid rgba(108,99,255,.2);border-radius:10px;padding:14px 18px;font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.7}
    .info-banner strong{color:var(--text)}

    /* Error/success */
    .page-msg{text-align:center;padding:80px 20px}
    .page-msg h2{font-family:var(--font-head);font-size:22px;margin-bottom:10px}
    .page-msg p{color:var(--muted);font-size:14px}

    /* Toast */
    #toast{position:fixed;bottom:28px;right:28px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;font-size:13px;display:none;z-index:999;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
    #toast.show{display:block} #toast.ok{border-color:var(--success)} #toast.err{border-color:var(--danger)} #toast.warn{border-color:var(--warn)}

    /* Loader */
    .loader{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Last saved */
    .last-saved{font-size:11px;color:var(--muted)}
  .plang-btn{background:none;border:none;color:var(--muted);font-size:11px;font-weight:700;padding:4px 7px;border-radius:5px;cursor:pointer;transition:all .15s}
.plang-btn.active{background:var(--accent);color:#fff}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:16px">
    <div class="logo">Smartest<span>Guide</span></div>
    <div class="hotel-name-bar">Správa hotelu: <strong id="hotel-name-bar">–</strong></div>
  </div>
  <div class="save-bar">
    <span class="last-saved" id="last-saved"></span>
    <span class="unsaved-dot" id="unsaved-dot"></span>
    <button class="btn btn-primary" id="save-btn" onclick="saveAll()" disabled>💾 Uložit změny</button>
  </div>
</div>

<div class="container" id="completeness-banner" style="max-width:700px;margin:16px auto 0"></div>

<div class="container" id="main-container">
  <div class="page-msg"><div class="loader"></div><p style="margin-top:16px;color:var(--muted)">Načítám data hotelu…</p></div>
</div>

<div id="toast"></div>

<script>
const API = '';
const token = new URLSearchParams(location.search).get('token');
let hotelData = null;
let hasChanges = false;

// ── Překlady portálu ─────────────────────────
const PORTAL_T = {
  cs:{
    title:"Hotelový portál",save:"Uložit změny",saving:"Ukládám...",saved:"Změny uloženy",
    cancel_sub:"Zrušit předplatné",cancel_confirm:"Opravdu zrušit předplatné?",
    pay_btn:"Zaplatit online",pay_active:"Předplatné aktivní",
    invoices:"Faktury",analytics:"Statistiky chatbota",embed:"Embed widget",
    no_invoices:"Žádné faktury",pdf:"PDF",logout:"Odhlásit",
  },
  en:{
    title:"Hotel Portal",save:"Save changes",saving:"Saving...",saved:"Changes saved",
    cancel_sub:"Cancel subscription",cancel_confirm:"Really cancel subscription?",
    pay_btn:"Pay online",pay_active:"Subscription active",
    invoices:"Invoices",analytics:"Chatbot statistics",embed:"Embed widget",
    no_invoices:"No invoices",pdf:"PDF",logout:"Logout",
  },
  de:{
    title:"Hotelportal",save:"Änderungen speichern",saving:"Speichere...",saved:"Änderungen gespeichert",
    cancel_sub:"Abo kündigen",cancel_confirm:"Abo wirklich kündigen?",
    pay_btn:"Online bezahlen",pay_active:"Abonnement aktiv",
    invoices:"Rechnungen",analytics:"Chatbot-Statistiken",embed:"Einbetten",
    no_invoices:"Keine Rechnungen",pdf:"PDF",logout:"Abmelden",
  },
  es:{
    title:"Portal del hotel",save:"Guardar cambios",saving:"Guardando...",saved:"Cambios guardados",
    cancel_sub:"Cancelar suscripción",cancel_confirm:"¿Cancelar suscripción?",
    pay_btn:"Pagar en línea",pay_active:"Suscripción activa",
    invoices:"Facturas",analytics:"Estadísticas del chatbot",embed:"Insertar widget",
    no_invoices:"Sin facturas",pdf:"PDF",logout:"Cerrar sesión",
  },
  pl:{
    title:"Portal hotelowy",save:"Zapisz zmiany",saving:"Zapisuję...",saved:"Zmiany zapisane",
    cancel_sub:"Anuluj subskrypcję",cancel_confirm:"Anulować subskrypcję?",
    pay_btn:"Zapłać online",pay_active:"Subskrypcja aktywna",
    invoices:"Faktury",analytics:"Statystyki chatbota",embed:"Osadź widget",
    no_invoices:"Brak faktur",pdf:"PDF",logout:"Wyloguj",
  },
  it:{
    title:"Portale hotel",save:"Salva modifiche",saving:"Salvataggio...",saved:"Modifiche salvate",
    cancel_sub:"Annulla abbonamento",cancel_confirm:"Annullare abbonamento?",
    pay_btn:"Paga online",pay_active:"Abbonamento attivo",
    invoices:"Fatture",analytics:"Statistiche chatbot",embed:"Incorpora widget",
    no_invoices:"Nessuna fattura",pdf:"PDF",logout:"Esci",
  },
};

let portalLang = localStorage.getItem('sg_portal_lang') || 'cs';

function setPortalLang(lang){
  portalLang = lang;
  localStorage.setItem('sg_portal_lang', lang);
  document.querySelectorAll('.plang-btn').forEach(b => {
    b.classList.toggle('active', b.id === 'plb-'+lang);
  });
  // Znovu renderuj portál s novým jazykem
  if(hotelData) renderPortal();
}

function t(key){ return (PORTAL_T[portalLang]||PORTAL_T.cs)[key] || key; }

// ── Init ──────────────────────────────────────
// Nastav výchozí jazyk přepínače
document.querySelectorAll('.plang-btn').forEach(b => {
  b.classList.toggle('active', b.id === 'plb-'+portalLang);
});

if (!token) {
  document.getElementById('main-container').innerHTML = `
    <div class="page-msg">
      <h2>⛔ Přístup odepřen</h2>
      <p>Tento odkaz není platný. Požádej správce SmartestGuide o nový přístupový odkaz.</p>
    </div>`;
} else {
  loadHotel();
}

async function loadHotel() {
  try {
    const r = await fetch(`${API}/api/hotel-portal/me?token=${token}`);
    if (!r.ok) throw new Error('Neplatný token');
    const d = await r.json();
    hotelData = d.hotel;
    renderPortal();
    loadCompleteness();
    loadPaymentSection();
    loadInvoicesSection();
    loadAnalytics();
    setTimeout(initEmbedCode, 100);
  } catch(e) {
    document.getElementById('main-container').innerHTML = `
      <div class="page-msg">
        <h2>⛔ Přístup odepřen</h2>
        <p>${e.message === 'Neplatný token' ? 'Tento přístupový odkaz není platný nebo byl zrušen.' : 'Nelze se připojit k serveru. Ujisti se, že aplikace běží.'}</p>
      </div>`;
  }
}

async function loadCompleteness() {
  try {
    const r = await fetch(`${API}/api/hotel-portal/completeness?token=${token}`);
    if (!r.ok) return;
    const d = await r.json();
    renderCompleteness(d);
  } catch(e) {}
}

function renderCompleteness(d) {
  const el = document.getElementById('completeness-banner');
  if (!el) return;
  const score = d.score || 0;
  const color = score >= 80 ? '#2ecc87' : score >= 50 ? '#ffaa33' : '#ff4f6a';
  const emoji = score >= 80 ? '🟢' : score >= 50 ? '🟡' : '🔴';
  const missingReq = d.missing_required || [];
  const missingBonus = d.missing_bonus || [];

  let motivText = '';
  if (score < 80) {
    motivText = `<div style="margin-top:12px;padding:12px 14px;background:rgba(255,170,51,.08);border:1px solid rgba(255,170,51,.3);border-radius:8px;font-size:13px">
      <strong style="color:var(--warn)">⚠️ Profil není kompletní – hosté mohou dostávat neúplné odpovědi!</strong>
      ${missingReq.length ? `<div style="margin-top:8px;color:var(--muted)">Chybí povinná pole: <strong style="color:var(--text)">${missingReq.join(', ')}</strong></div>` : ''}
    </div>`;
  } else if (missingBonus.length) {
    motivText = `<div style="margin-top:12px;padding:12px 14px;background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.2);border-radius:8px;font-size:13px;color:var(--muted)">
      💡 Tip: Doplňte <strong style="color:var(--text)">${missingBonus.slice(0,3).join(', ')}</strong> pro ještě lepší odpovědi Alexe.
    </div>`;
  } else {
    motivText = `<div style="margin-top:12px;font-size:13px;color:var(--success)">✅ Skvělé! Profil je kompletně vyplněn.</div>`;
  }

  _sectionIdx = 0;
  el.innerHTML = `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:14px;font-weight:600">${emoji} Vyplněnost profilu hotelu</div>
        <div style="font-family:var(--font-head);font-size:24px;font-weight:700;color:${color}">${score}%</div>
      </div>
      <div style="background:var(--border);border-radius:6px;height:10px;overflow:hidden">
        <div style="background:${color};height:100%;border-radius:6px;width:${score}%;transition:width .6s ease"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted)">
        <span>Základní údaje: ${d.filled_required}/${d.total_required}</span>
        <span>Bonusové údaje: ${d.filled_bonus}/${d.total_bonus}</span>
      </div>
      ${motivText}
    </div>`;
}

// ── Render ────────────────────────────────────
function renderPortal() {
  const h = hotelData;
  document.getElementById('hotel-name-bar').textContent = h.name || '–';
  document.getElementById('save-btn').disabled = false;

  const lastEdit = h.portal_last_edit
    ? `Naposledy upraveno: ${new Date(h.portal_last_edit).toLocaleString('cs-CZ')}`
    : 'Zatím neupraveno';

  const subStatus = h.subscription_active
    ? '<span class="status-pill active">● Předplatné aktivní</span>'
    : '<span class="status-pill inactive">○ Předplatné neaktivní</span>';

  document.getElementById('main-container').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-family:var(--font-head);font-size:22px;font-weight:700">${esc(h.name||'Bez názvu')}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px">${esc(h.url||h.source_url||'')}</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        ${subStatus}
        <span style="font-size:11px;color:var(--muted)">${lastEdit}</span>
      </div>
    </div>

    <div class="info-banner">
      <strong>Jak to funguje:</strong> Vyplňte informace o vašem hotelu co nejpřesněji.
      Tyto informace bude avatar sdělovat vašim hostům. Čím více vyplníte, tím lépe
      bude avatar sloužit. Po každé úpravě klikněte na <strong>Uložit změny</strong>.
    </div>

    <div id="payment-section"></div>

    ${renderSection('📋', 'Základní provozní informace', 'Check-in, check-out, stravování', `
      <table class="edit-table">
        ${row('Hvězdičky ★ (1–5)', 'star_rating', 'number', h.star_rating, '1 až 5')}
        ${row('Check-in od', 'checkin_time', 'text', h.checkin_time, 'např. 14:00')}
        ${row('Check-out do', 'checkout_time', 'text', h.checkout_time, 'např. 11:00')}
        ${row('Snídaně', 'breakfast_hours', 'text', h.breakfast_hours, 'např. 7:00–10:00')}
        ${row('Oběd', 'lunch_hours', 'text', h.lunch_hours, 'např. 12:00–14:00 nebo nevyplňovat')}
        ${row('Večeře', 'dinner_hours', 'text', h.dinner_hours, 'např. 18:00–22:00')}
        ${row('Počet lůžek', 'bed_count', 'number', h.bed_count, 'přesný počet lůžek')}
        ${row('Počet pokojů', 'room_count', 'number', h.room_count, '')}
      </table>
    `, ['star_rating','checkin_time','checkout_time','breakfast_hours','bed_count'], true)}

    ${renderSection('📞', 'Kontaktní informace', 'Jak hosté mohou kontaktovat hotel', `
      <table class="edit-table">
        ${row('Telefon recepce', 'phone', 'tel', h.phone, '+420 123 456 789')}
        ${row('E-mail', 'email', 'email', h.email, 'recepce@hotel.cz')}
        ${row('WhatsApp', 'whatsapp_number', 'tel', h.whatsapp_number, '+420 123 456 789')}
        ${row('Adresa', 'address', 'text', h.address, 'Václavské náměstí 1, Praha')}
        ${row('Kód země (CZ/SK/AT/DE...)', 'country', 'text', h.country, 'CZ')}
      </table>
    `, ['phone','email','address'])}

    ${renderSection('🍽️', 'Restaurace & wellness', 'Informace o stravování a relaxaci', `
      <table class="edit-table">
        ${row('Název restaurace', 'restaurant_name', 'text', h.restaurant_name, '')}
        ${row('Wellness / Spa', 'wellness_info', 'text', h.wellness_info, 'např. Sauna, bazén, masáže – otevřeno 8–21')}
        ${row('Parkování', 'parking_info', 'text', h.parking_info, 'např. Bezplatné parkování před hotelem')}
      </table>
    `, ['restaurant_name','wellness_info','parking_info'])}

    ${renderSection('✨', 'Vybavení hotelu', 'Co hotel nabízí – hosté se mohou zeptat', `
      <table class="edit-table">
        <tr>
          <td>Vybavení</td>
          <td>${tagsInput('amenities', h.amenities||[], 'Přidej položku a stiskni Enter…')}</td>
        </tr>
      </table>
      <div style="font-size:11px;color:var(--muted);margin-top:8px;padding:0 4px">
        Příklady: WiFi zdarma, Bazén, Sauna, Fitness, Klimatizace, Parkování, Restaurace, Bar, Výtah, Pets allowed…
      </div>
    `, ['amenities'])}

    ${renderSection('🏊', 'Služby hotelu', 'Fitness, bazén, spa, doprava', `
      <table class="edit-table">
        ${row('Fitness / Gym', 'fitness_info', 'text', h.fitness_info, 'např. Otevřeno 6:00–22:00, vstup zdarma')}
        ${row('Bazén', 'pool_info', 'text', h.pool_info, 'např. Krytý bazén, 25m, otevřeno celoročně')}
        ${row('Spa / Masáže', 'spa_info', 'text', h.spa_info, 'např. Thajské masáže, rezervace na recepci')}
        ${row('Room service', 'room_service_hours', 'text', h.room_service_hours, 'např. 0–24h, menu na pokoji')}
        ${row('Prádelna / Čistírna', 'laundry_info', 'text', h.laundry_info, 'např. Výdej do 24h, expresní 4h')}
        ${row('Půjčovna kol', 'bike_rental', 'text', h.bike_rental, 'cena a dostupnost')}
        ${row('Transfer / Shuttle', 'transfer_info', 'text', h.transfer_info, 'např. Shuttle na letiště, taxi')}
        ${row('Kongresový sál', 'congress_info', 'text', h.congress_info, 'kapacita a vybavení')}
        ${row('Domácí mazlíčci', 'pets_policy', 'text', h.pets_policy, 'např. Povoleno, příplatek 200 Kč/noc')}
        ${row('Bezbariérový přístup', 'accessibility', 'text', h.accessibility, 'výtah, bezbariérové pokoje')}
      </table>
    `, ['fitness_info','pool_info','spa_info','room_service_hours','laundry_info'])}

    ${renderSection('🍽️', 'Stravování — podrobnosti', 'Typ snídaně, bar, minibar', `
      <table class="edit-table">
        ${row('Typ snídaně', 'breakfast_type', 'text', h.breakfast_type, 'např. Bufet, À la carte, Kontinentální')}

// Accordion sekce se scoring
let _sectionIdx = 0;
let _sectionFields = {}; // uložíme fields pro každou sekci, scoring spočítáme po renderování

function renderSection(icon, title, desc, content, fields, defaultOpen) {
  const id = 'sec-' + (_sectionIdx++);
  // Ulož fields pro pozdější scoring (DOM ještě neexistuje)
  if (fields && fields.length) _sectionFields[id] = fields;
  const isOpen = defaultOpen ? 'open' : '';
  // Placeholder pro score badge – vyplní updateSectionScore() po renderování
  const scorePlaceholder = fields && fields.length
    ? `<span class="section-score" id="score-${id}"><span class="score-badge empty">○ 0/${fields.length}</span></span>`
    : '';
  return `<div class="section" id="${id}">
    <div class="section-head ${isOpen}" onclick="toggleSection('${id}')">
      <div class="section-icon">${icon}</div>
      <div style="flex:1;min-width:0">
        <div class="section-title">${title}</div>
        <div class="section-desc">${desc}</div>
      </div>
      ${scorePlaceholder}
      <span class="section-chevron ${isOpen}">▼</span>
    </div>
    <div class="section-body ${isOpen}">${content}</div>
  </div>`;
}

function updateSectionScore(id) {
  const fields = _sectionFields[id];
  if (!fields) return;
  const el = document.getElementById('score-' + id);
  if (!el) return;
  const filled = fields.filter(k => {
    const inp = document.getElementById('f-' + k);
    if (inp) return inp.value.trim() !== '';
    const tags = document.querySelectorAll('#tags-' + k + ' .tag-item');
    return tags.length > 0;
  }).length;
  const total = fields.length;
  const cls = filled === total ? 'full' : filled > 0 ? 'partial' : 'empty';
  const emoji = filled === total ? '✓' : filled > 0 ? '◑' : '○';
  el.innerHTML = `<span class="score-badge ${cls}">${emoji} ${filled}/${total}</span>`;
}

function updateAllSectionScores() {
  Object.keys(_sectionFields).forEach(id => updateSectionScore(id));
}

function toggleSection(id) {
  const sec = document.getElementById(id);
  const head = sec.querySelector('.section-head');
  const body = sec.querySelector('.section-body');
  const chev = sec.querySelector('.section-chevron');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  head.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
}

function row(label, key, type, val, placeholder) {
  return `<tr>
    <td>${label}</td>
    <td><input type="${type}" id="f-${key}" value="${esc(String(val??''))}" placeholder="${esc(placeholder)}" oninput="markChanged()"></td>
  </tr>`;
}
function rowTextarea(label, key, val, placeholder) {
  return `<tr>
    <td>${label}</td>
    <td><textarea id="f-${key}" placeholder="${esc(placeholder)}" oninput="markChanged()">${esc(String(val??''))}</textarea></td>
  </tr>`;
}

let cfCount = 0;
function addCf() {
  // Zjisti aktuální počet
  let i = 0;
  while(document.getElementById('cf-label-'+i)) i++;
  cfCount = i;
  const container = document.getElementById('custom-fields-container');
  const addRow = document.getElementById('cf-add-row');
  const div = document.createElement('div');
  div.id = 'cf-row-'+cfCount;
  div.style.cssText = 'display:grid;grid-template-columns:200px 1fr auto;gap:8px;margin-bottom:10px;align-items:start';
  div.innerHTML = `
    <input type="text" id="cf-label-${cfCount}" placeholder="Název (např. Zmrzlina)" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:10px 14px;outline:none" oninput="markChanged()">
    <textarea id="cf-value-${cfCount}" placeholder="Popis / hodnota…" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:10px 14px;outline:none;resize:vertical;min-height:42px" oninput="markChanged()"></textarea>

  const row = document.getElementById('cf-row-'+i);
  if(row) { row.remove(); markChanged(); }

// ── Tag input ─────────────────────────────────
function tagsInput(key, items, placeholder) {
  const tagsHtml = items.map(t =>
    `<span class="tag-item" data-val="${esc(t)}">${esc(t)}<button type="button" onclick="removeTag('${key}',this)">×</button></span>`
  ).join('');
  return `<div class="tags-wrap" id="tags-${key}" onclick="document.getElementById('taginput-${key}').focus()">
    ${tagsHtml}
    <input class="tag-input" id="taginput-${key}" placeholder="${esc(placeholder)}" onkeydown="tagKeydown(event,'${key}')">
  </div>`;
}

function initTagInput(key) {
  // Already rendered, just make sure clicks work
}

function tagKeydown(e, key) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,$/, '');
    if (!val) return;
    addTag(key, val);
    e.target.value = '';
    markChanged();
  }
  if (e.key === 'Backspace' && e.target.value === '') {
    const wrap = document.getElementById('tags-' + key);
    const tags = wrap.querySelectorAll('.tag-item');
    if (tags.length) tags[tags.length-1].remove();
    markChanged();
  }
}

function addTag(key, val) {
  const wrap = document.getElementById('tags-' + key);
  const inp = document.getElementById('taginput-' + key);
  const span = document.createElement('span');
  span.className = 'tag-item';
  span.dataset.val = val;
  span.innerHTML = `${esc(val)}<button type="button" onclick="removeTag('${key}',this)">×</button>`;
  wrap.insertBefore(span, inp);
}

function removeTag(key, btn) {
  btn.parentElement.remove();
  markChanged();
}

function getTagValues(key) {
  return [...document.querySelectorAll(`#tags-${key} .tag-item`)].map(t => t.dataset.val);
}

  hasChanges = true;

function calcPrice(beds){
  if(!beds)return 300;
  return beds<=100?300:300+(beds-100)*3;
}

  try {
    const r = await fetch(`${API}/api/hotel-portal/update?token=${token}`, {

      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    hotelData = d.hotel;
    hasChanges = false;
    document.getElementById('unsaved-dot').classList.remove('show');
    const now = new Date().toLocaleTimeString('cs-CZ', {hour:'2-digit',minute:'2-digit'});
    document.getElementById('last-saved').textContent = `Uloženo v ${now}`;
    // Okamžitá aktualizace platební sekce a hlavičky bez refreshe
    await loadPaymentSection();
    // Přepočítej completeness skóre
    await loadCompleteness();
    const oldBeds = hotelData.subscription_paid_beds || 0;
    const newBeds = hotelData.bed_count || 0;
    if(hotelData.subscription_active && newBeds > oldBeds && oldBeds > 0){
      toast('⚠️ Počet lůžek zvýšen – vyžadován doplatek!', 'warn');
    } else {
      toast('✅ Změny uloženy!');
    }
  } catch(e) {
    toast('Chyba při ukládání: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '💾 Uložit změny';
  }
}

// Varování při opuštění stránky s neuloženými změnami
window.addEventListener('beforeunload', e => {
  if (hasChanges) { e.preventDefault(); e.returnValue = ''; }
});

// ── Faktury ──────────────────────────────────
async function loadInvoicesSection(){
  const el=document.getElementById('invoices-section');
  if(!el)return;
  try{
    const r=await fetch(`${API}/api/hotel-portal/invoices?token=${token}`);
    if(!r.ok)return;
    const d=await r.json();
    const invs=d.invoices||[];
    if(!invs.length){
      el.innerHTML='';
      return;
    }
    const statusLabel={issued:'⏳ Vystavena',paid:'✅ Zaplacena',cancelled:'✕ Stornována'};
    const statusColor={issued:'rgba(255,170,51,.15)',paid:'rgba(46,204,135,.15)',cancelled:'rgba(122,127,168,.15)'};
    const statusTextColor={issued:'#ffaa33',paid:'#2ecc87',cancelled:'#7a7fa8'};
    const rows=invs.map(inv=>`
      <tr style="border-bottom:1px solid rgba(42,47,74,.7)">
        <td style="padding:12px 14px;font-family:monospace;font-size:12px;color:var(--muted)">${inv.invoice_number}</td>
        <td style="padding:12px 14px;font-size:13px">${inv.period_from?inv.period_from.slice(0,7):'–'}</td>
        <td style="padding:12px 14px;font-weight:600">${inv.amount_local} ${inv.currency_symbol||inv.currency_code}</td>
        <td style="padding:12px 14px"><span style="background:${statusColor[inv.status]};color:${statusTextColor[inv.status]};padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600">${statusLabel[inv.status]||inv.status}</span></td>
        <td style="padding:12px 14px"><button onclick="downloadMyInvoice('${inv.id}')" style="background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer">PDF</button></td>
      </tr>`).join('');

    el.innerHTML=`
      <div class="section">
        <div class="section-head">
          <div class="section-icon">🧾</div>
          <div><div class="section-title">Faktury</div><div class="section-desc">Historie plateb a faktury ke stažení</div></div>
        </div>
        <table style="width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
          <thead><tr style="border-bottom:1px solid var(--border)">
            <th style="padding:10px 14px;font-size:11px;color:var(--muted);text-align:left;text-transform:uppercase">Číslo</th>
            <th style="padding:10px 14px;font-size:11px;color:var(--muted);text-align:left;text-transform:uppercase">Období</th>
            <th style="padding:10px 14px;font-size:11px;color:var(--muted);text-align:left;text-transform:uppercase">Částka</th>
            <th style="padding:10px 14px;font-size:11px;color:var(--muted);text-align:left;text-transform:uppercase">Stav</th>
            <th style="padding:10px 14px;font-size:11px;color:var(--muted);text-align:left;text-transform:uppercase">Akce</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }catch(e){}
}

// ── Analytics ────────────────────────────────
async function loadAnalytics(){
  try{
    const r = await fetch(`${API}/api/hotel-portal/analytics?token=${token}`);
    if(!r.ok) return;
    const d = await r.json();
    const a = d.analytics;
    // Zobrazuj analytics vždy, i při 0 chatech

    const TOPIC_LABELS = {
      checkin:'Check-in/out', checkout:'Check-in/out', breakfast:'Snídaně',
      parking:'Parkování', wellness:'Wellness/Spa', restaurant:'Restaurace',
      weather:'Počasí', nearby:'Okolí', contact:'Kontakt'
    };

    // Seřaď témata
    const topics = Object.entries(a.topics||{})
      .sort((x,y)=>y[1]-x[1])
      .slice(0,6);

    const topicHtml = topics.map(([k,v])=>{
      const pct = Math.round((v/a.total)*100);
      return `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
          <span>${TOPIC_LABELS[k]||k}</span>
          <span style="color:var(--accent2);font-weight:600">${v}x</span>
        </div>
        <div style="background:var(--border);border-radius:4px;height:6px">
          <div style="background:var(--accent);border-radius:4px;height:6px;width:${pct}%"></div>
        </div>
      </div>`;
    }).join('');

    const lastChat = a.last_chat ? new Date(a.last_chat).toLocaleDateString('cs-CZ') : '–';

    const el = document.getElementById('analytics-section');
    if(!el) return;
    const noDataHtml = a.total === 0 ? `
      <div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">
        📊 Zatím žádné chaty. Data se zobrazí po prvním použití hostem.
      </div>` : '';
    el.innerHTML = `
      <div class="section">
        <div class="section-head">
          <div class="section-icon">📊</div>
          <div><div class="section-title">Statistiky chatbota</div>
          <div class="section-desc">Přehled dotazů vašich hostů</div></div>
        </div>
        ${a.total > 0 ? `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
          <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center">
            <div style="font-size:32px;font-weight:700;color:var(--accent)">${a.total}</div>
            <div style="font-size:12px;color:var(--muted)">Celkem dotazů</div>
          </div>
          <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center">
            <div style="font-size:18px;font-weight:700;color:var(--accent2)">${lastChat}</div>
            <div style="font-size:12px;color:var(--muted)">Poslední chat</div>
          </div>
        </div>
        ${topics.length ? `<div style="font-size:12px;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">Nejčastější témata</div>${topicHtml}` : ''}
        ` : noDataHtml}
      </div>`;
  }catch(e){}
}

// ── Embed widget ─────────────────────────────
function initEmbedCode(){
  const el = document.getElementById('embed-code');
  if(!el || !hotelData) return;
  const base = window.location.origin;
  const code = '<script src="' + base + '/widget.js?hotel_id=' + hotelData.id + '"><\/script>';
  el.textContent = code;
  // Přidej poznámku pokud je ngrok URL
  const note = document.getElementById('embed-note');
  if(note){
    if(base.includes('ngrok')){
      note.textContent = '⚠️ Tato URL je dočasná (ngrok). Po nasazení na server použijte produkční URL.';
      note.style.color = 'var(--warn)';
    } else {
      note.textContent = '✅ Produkční URL — kód je připraven k použití.';
      note.style.color = 'var(--success)';
    }
  }
}

function copyEmbedCode(){
  const el = document.getElementById('embed-code');
  if(!el) return;
  navigator.clipboard.writeText(el.textContent).then(()=>toast('✅ Kód zkopírován!'));
}

function previewWidget(){
  const base = window.location.origin;
  window.open(`${base}/guest/${hotelData.id}`, 'sg_preview', 'width=420,height=700');
}

// ── Zrušení předplatného ─────────────────────
async function cancelSubscription(){
  if(!confirm('Opravdu chcete zrušit předplatné?\n\nPřístup bude deaktivován. Můžete se znovu přihlásit kdykoliv.'))return;
  try{
    const r=await fetch(`${API}/api/hotel-portal/cancel?token=${token}`,{method:'POST'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    hotelData=d.hotel;
    toast('Předplatné zrušeno','warn');
    loadPaymentSection();
  }catch(e){toast('Chyba: '+e.message,'err');}
}

// ── Blokace editace při nedoplatku ───────────
function blockEditing(){
  document.querySelectorAll('input,textarea').forEach(el=>{
    el.disabled=true;
    el.style.opacity='0.4';
    el.style.cursor='not-allowed';
  });
  document.querySelectorAll('.tags-wrap').forEach(el=>{
    el.style.opacity='0.4';
    el.style.pointerEvents='none';
  });
  const btn=document.getElementById('save-btn');
  if(btn){btn.disabled=true;btn.textContent='⚠️ Uhraďte doplatek';}
}

// ── Utils ─────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type='ok'){const e=document.getElementById('toast');e.textContent=msg;e.className='show '+type;setTimeout(()=>e.className='',3500);}
</script>
