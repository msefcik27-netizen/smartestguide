<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SMARTEST GUIDE – Hotel AI Concierge</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
  --bg:#ffffff;--bg2:#faf9f5;--bg3:#f7f6f4;
  --ink:#1a1a1a;--ink2:#4a4a4a;--border:#e8e4dc;
  --muted:#6b6b6b;--text:#1a1a1a;--dim:#6b6b6b;
  --teal:#00d4aa;--teal-light:rgba(0,212,170,.08);
  --accent:#FF6B00;--accent2:#00d4aa;
  --gold:#FF6B00;--gold-light:rgba(255,107,0,.08);
  --surface:#ffffff;--surface2:#faf9f5;
  --font-head:'Syne',sans-serif;--font-body:'Inter',sans-serif;
}
/* Portál zůstává vždy světlý (nezávisle na systémovém tmavém režimu) */
html{color-scheme:light}
/* Zvýraznění vybrané (otevřené) sekce — jemné šedé pozadí + oranžový pruh vlevo */
.section.section-open{background:rgba(120,120,120,.08);box-shadow:inset 3px 0 0 var(--accent);border-color:var(--accent)}
.section-toggle-lbl{font-size:11px;color:var(--muted);margin:0 4px;white-space:nowrap;user-select:none}
/* Sidebar strom — každá položka na 1 řádek */
#portal-sidebar a{white-space:nowrap;overflow:hidden}
/* Restaurace ve dvou sloupcích (na mobilu 1) */
#restaurants-list{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
@media(max-width:760px){#restaurants-list{grid-template-columns:1fr}}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.6;min-height:100vh}

    /* Top bar */
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .logo{font-family:var(--font-head);font-size:16px;font-weight:700}
    .logo span{color:var(--accent)}
    .hotel-name-bar{font-size:13px;color:var(--muted)}
    .hotel-name-bar strong{color:var(--text)}
    .save-bar{display:flex;align-items:center;gap:12px}
    .unsaved-dot{width:8px;height:8px;border-radius:50%;background:var(--warn);display:none}
    .unsaved-dot.show{display:block}

    /* Layout */
    .container{max-width:100%;margin:0;padding:24px 32px}

    /* Sekce – accordion */
    .section{margin-bottom:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .section-head{display:flex;align-items:center;gap:10px;padding:14px 18px;cursor:pointer;user-select:none;transition:background .15s}
    .section-head:hover{background:rgba(255,107,0,.06)}
    .section-head.open{border-bottom:1px solid var(--border)}
    .section-icon{font-size:18px;width:34px;height:34px;background:rgba(255,107,0,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .section-title{font-family:var(--font-head);font-size:14px;font-weight:600}
    .section-desc{font-size:11px;color:var(--muted);margin-top:1px}
    .section-chevron{margin-left:auto;font-size:12px;color:var(--muted);transition:transform .2s;flex-shrink:0}
    .section-chevron.open{transform:rotate(180deg)}
    .section-score{margin-left:8px;flex-shrink:0}
    .score-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
    .score-badge.full{background:rgba(46,204,135,.15);color:#2ecc87;border:1px solid rgba(46,204,135,.3)}
    .score-badge.partial{background:rgba(255,170,51,.15);color:#ffaa33;border:1px solid rgba(255,170,51,.3)}
    .score-badge.empty{background:rgba(255,79,106,.1);color:#ff4f6a;border:1px solid rgba(255,79,106,.2)}
    .section-body{display:none;padding:16px 18px}
    .section-body.open{display:block}

    /* Editovatelná tabulka */
    .edit-table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .edit-table tr{border-bottom:1px solid rgba(42,47,74,.7)}
    .edit-table tr:last-child{border-bottom:none}
    .edit-table tr:hover{background:rgba(255,107,0,.03)}
    .edit-table td:first-child{width:180px;padding:12px 16px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:600;vertical-align:top;padding-top:14px}
    .edit-table td:last-child{padding:8px 12px 8px 0}

    input[type=text],input[type=number],input[type=email],input[type=tel],textarea{
      background:transparent;border:1px solid transparent;border-radius:6px;color:var(--text);
      font-family:var(--font-body);font-size:13px;padding:6px 10px;width:100%;outline:none;
      transition:all .15s;
    }
    input:hover,textarea:hover{border-color:var(--border);background:var(--surface)}
    input:focus,textarea:focus{border-color:var(--accent);background:var(--surface)}
    textarea{resize:vertical;min-height:70px}

    /* Tags input */
    .tags-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:6px 10px;border:1px solid transparent;border-radius:6px;min-height:40px;cursor:text;transition:all .15s}
    .tags-wrap:hover{border-color:var(--border);background:var(--surface)}
    .tags-wrap:focus-within{border-color:var(--accent);background:var(--surface)}
    .tag-item{background:rgba(255,107,0,.15);color:var(--accent);border:1px solid rgba(255,107,0,.3);border-radius:20px;padding:3px 10px;font-size:12px;display:flex;align-items:center;gap:6px;white-space:nowrap}
    .tag-item button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;line-height:1;padding:0;opacity:.7}
    .tag-item button:hover{opacity:1}
    .tag-input{border:none;background:transparent;color:var(--text);font-size:12px;outline:none;min-width:120px;padding:3px 4px}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
    .btn-primary{background:var(--accent);color:#ffffff;font-weight:700} .btn-primary:hover{background:#e05e00;color:#ffffff}
    .btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)} .btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    /* Status badge */
    .status-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600}
    .status-pill.active{background:rgba(46,204,135,.12);color:var(--success);border:1px solid rgba(46,204,135,.3)}
    .status-pill.inactive{background:rgba(122,127,168,.12);color:var(--muted);border:1px solid rgba(122,127,168,.3)}

    /* Info banner */
    .info-banner{background:rgba(255,107,0,.08);border:1px solid rgba(255,107,0,.2);border-radius:10px;padding:14px 18px;font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.7}
    .info-banner strong{color:var(--text)}

    /* Error/success */
    .page-msg{text-align:center;padding:80px 20px}
    .page-msg h2{font-family:var(--font-head);font-size:22px;margin-bottom:10px}
    .page-msg p{color:var(--muted);font-size:14px}

    /* Toast */
    #portal-sidebar a{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:13px;color:var(--muted);text-decoration:none;border-left:2px solid transparent;transition:all .15s;cursor:pointer}
    #portal-sidebar a:hover{color:var(--text);background:rgba(255,107,0,.06)}
    #portal-sidebar a.active{color:var(--accent);border-left-color:var(--accent);background:rgba(255,107,0,.08);font-weight:600}
    #portal-sidebar .sidebar-section{padding:12px 16px 4px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-top:8px}
    #portal-sidebar a{display:flex;align-items:center;gap:8px;padding:8px 16px;font-size:13px;color:var(--muted);text-decoration:none;border-left:2px solid transparent;transition:all .15s;cursor:pointer}
    #portal-sidebar a:hover{color:var(--text);background:rgba(255,107,0,.06)}
    #portal-sidebar a.active{color:var(--accent);border-left-color:var(--accent);background:rgba(255,107,0,.08);font-weight:600}
    #portal-sidebar .sidebar-section{padding:12px 16px 4px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600;margin-top:8px}
    #toast{position:fixed;bottom:28px;right:28px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;font-size:13px;display:none;z-index:999;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
    #toast.show{display:block} #toast.ok{border-color:var(--success)} #toast.err{border-color:var(--danger)} #toast.warn{border-color:var(--warn)}

    /* Loader */
    .loader{width:18px;height:18px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Last saved */
    .last-saved{font-size:11px;color:var(--muted)}
  .plang-btn{background:none;border:none;color:var(--muted);font-size:11px;font-weight:700;padding:4px 7px;border-radius:5px;cursor:pointer;transition:all .15s}
.plang-btn.active{background:var(--accent);color:#ffffff;font-weight:700}
</style>
</head>
<body>
<div style="position:fixed;top:0;left:0;right:0;height:3px;z-index:200;background:linear-gradient(90deg,#00d4aa 0%,#00d4aa 60%,#FF6B00 100%);box-shadow:0 0 10px rgba(0,212,170,.35)"></div>
<div style="position:fixed;top:0;left:0;right:0;height:3px;z-index:9999;background:linear-gradient(90deg,#00d4aa,#00d4aa 60%,#FF6B00);box-shadow:0 0 10px rgba(0,212,170,.3)"></div>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:16px">
    <div class="logo">SMARTEST GUIDE<span style="width:6px;height:6px;border-radius:50%;background:#FF6B00;display:inline-block;margin-left:3px;margin-bottom:1px;box-shadow:0 0 6px rgba(255,107,0,.8)"></span></div>
    <div class="hotel-name-bar">Hotel AI Concierge: <strong id="hotel-name-bar">–</strong></div>
  </div>
  <div class="save-bar">
    <span style="display:inline-flex;gap:2px;border:1px solid var(--border);border-radius:7px;padding:2px">
      <button class="plang-btn" id="plb-cs" onclick="setPortalLang('cs')" title="Česky">CZ</button>
      <button class="plang-btn" id="plb-en" onclick="setPortalLang('en')" title="English">EN</button>
    </span>
    <span class="last-saved" id="last-saved"></span>
    <span class="unsaved-dot" id="unsaved-dot"></span>
    <button class="btn btn-secondary" id="save-btn" onclick="saveAll()" title="Ukládá se automaticky — tlačítko je jen pojistka">✓ Uloženo</button>
  </div>
</div>

<div style="display:flex;min-height:calc(100vh - 60px)">

<!-- Sidebar navigace -->
<div id="portal-sidebar" style="width:280px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto">
  <div style="padding:0 16px;margin-bottom:8px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:600">Sekce</div>
  <div id="sidebar-nav"></div>
</div>

<!-- Hlavní obsah -->
<div style="flex:1;min-width:0;overflow-y:auto">
<div class="container" id="completeness-banner" style="max-width:100%;margin:16px 0 0;padding:0 32px"></div>

<div class="container" style="max-width:100%;padding:10px 32px 0;display:flex;justify-content:flex-end;gap:8px">
  <button class="btn btn-secondary" style="font-size:12px;padding:6px 14px" onclick="setAllSections(true)">⊞ Rozbalit vše</button>
  <button class="btn btn-secondary" style="font-size:12px;padding:6px 14px" onclick="setAllSections(false)">⊟ Sbalit vše</button>
</div>

<div class="container" id="main-container">
  <div class="page-msg"><div class="loader"></div><p style="margin-top:16px;color:var(--muted)">Načítám data hotelu…</p></div>
</div>

</div><!-- /hlavní obsah -->
</div><!-- /flex wrapper -->

<div id="toast"></div>

// Regexová pravidla pro uzly s čísly uvnitř textu
const EN_REGEX = [
  [/^(🟢|🟡|🔴) Vyplněnost profilu hotelu$/, "$1 Hotel profile completeness"],
  [/^🍽️ Restaurace (\d+)$/, "🍽️ Restaurant $1"],
  [/^(\d+) lůžek$/, "$1 beds"],
  [/^(\d+) lůžek × ceník SmartestGuide$/, "$1 beds × SmartestGuide pricing"],
  [/^(\d+(?:[.,]\d+)?) EUR \/ měsíc$/, "$1 EUR / month"],
  [/^💳 Uhradit doplatek (\d+(?:[.,]\d+)?) EUR →$/, "💳 Pay the difference of $1 EUR →"],
  [/^Vyplněno (\d+) z (\d+) polí$/, "Filled $1 of $2 fields"],
  [/^Naposledy upraveno: (.*)$/, "Last edited: $1"],
  [/^✓ Uloženo v (.*)$/, "✓ Saved at $1"],
  [/^· krok (\d+)\/(\d+): (.*)$/, (m)=>"· step "+m[1]+"/"+m[2]+": "+(EN_MAP[m[3]]||m[3])],
  [/^Základní údaje: (\d+)\/(\d+)$/, "Required fields: $1/$2"],
  [/^Bonusové údaje: (\d+)\/(\d+)$/, "Bonus fields: $1/$2"],
];

let portalLang = localStorage.getItem('sg_portal_lang') || '';
let _langLocked = !!portalLang;
if(!portalLang){
  const b=(navigator.language||'').slice(0,2).toLowerCase();
  portalLang = (b==='cs'||b==='sk') ? 'cs' : 'en';
}

function tr(s){
  if(portalLang!=='en') return s;
  const k = String(s).replace(/\s+/g,' ').trim();
  if(EN_MAP[k]!==undefined) return EN_MAP[k];
  if(k.startsWith('např. ')) return 'e.g. ' + k.slice(6);
  return s;
}
function trText(raw){
  if(portalLang!=='en') return raw;
  const key = String(raw).replace(/\s+/g,' ').trim();
  if(!key) return raw;
  const lead = raw.match(/^\s*/)[0], tail = raw.match(/\s*$/)[0];
  if(EN_MAP[key]!==undefined) return lead+EN_MAP[key]+tail;
  for(const [re,rep] of EN_REGEX){
    const m = key.match(re);
    if(m) return lead + (typeof rep==='function' ? rep(m) : key.replace(re,rep)) + tail;
  }
  if(key.includes(', ')){
    const parts = key.split(', ');
    if(parts.every(p=>EN_MAP[p]!==undefined)) return lead+parts.map(p=>EN_MAP[p]).join(', ')+tail;
  }
  return raw;
}
function translateDom(root){
  if(portalLang!=='en'||!root) return;
  try{
    const w = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
    const nodes=[]; while(w.nextNode()) nodes.push(w.currentNode);
    nodes.forEach(n=>{ const v=n.nodeValue; const t2=trText(v); if(t2!==v) n.nodeValue=t2; });
    if(root.querySelectorAll){
      root.querySelectorAll('[placeholder]').forEach(el=>{ el.placeholder = tr(el.placeholder); });
      root.querySelectorAll('[title]').forEach(el=>{ el.title = trText(el.title); });
    }
  }catch(e){}
}

  portalLang = (!c || c==='CZ' || c==='SK') ? 'cs' : 'en';
  updateLangButtons();
}

async function loadHotel() {
  try {
    const r = await fetch(`${API}/api/hotel-portal/me?token=${token}`);
    if (!r.ok) throw new Error('Neplatný token');
    const d = await r.json();
    hotelData = d.hotel;
    applyHotelDefaultLang();
    refreshStaticTexts();
    await loadPricing();
    renderPortal();
    renderOnboarding();
    loadCompleteness();
    loadPaymentSection();
    loadPmsSection();
    loadInvoicesSection();
    loadMonthlyReport();
    setTimeout(initEmbedCode, 100);
  } catch(e) {
    document.getElementById('main-container').innerHTML = `
      <div class="page-msg">
        <h2>⛔ Přístup odepřen</h2>
        <p>${e.message === 'Neplatný token' ? 'Tento přístupový odkaz není platný nebo byl zrušen.' : 'Nelze se připojit k serveru. Ujisti se, že aplikace běží.'}</p>
      </div>`;
    translateDom(document.getElementById('main-container'));
  }
}

async function loadCompleteness() {
  try {
    const r = await fetch(`${API}/api/hotel-portal/completeness?token=${token}`);
    if (!r.ok) return;
    const d = await r.json();
    renderCompleteness(d);
  } catch(e) {}
}

function renderCompleteness(d) {
  const el = document.getElementById('completeness-banner');
  if (!el) return;
  const score = d.score || 0;
  const color = score >= 80 ? '#2ecc87' : score >= 50 ? '#ffaa33' : '#ff4f6a';
  const emoji = score >= 80 ? '🟢' : score >= 50 ? '🟡' : '🔴';
  const missingReq = d.missing_required || [];
  const missingBonus = d.missing_bonus || [];

  let motivText = '';
  if (score < 80) {
    motivText = `<div style="margin-top:12px;padding:12px 14px;background:rgba(255,170,51,.08);border:1px solid rgba(255,170,51,.3);border-radius:8px;font-size:13px">
      <strong style="color:var(--warn)">⚠️ Profil není kompletní – hosté mohou dostávat neúplné odpovědi!</strong>
      ${missingReq.length ? `<div style="margin-top:8px;color:var(--muted)">Chybí povinná pole: <strong style="color:var(--text)">${missingReq.join(', ')}</strong></div>` : ''}
    </div>`;
  } else if (missingBonus.length) {
    motivText = `<div style="margin-top:12px;padding:12px 14px;background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.2);border-radius:8px;font-size:13px;color:var(--muted)">
      💡 Tip: Doplňte <strong style="color:var(--text)">${missingBonus.slice(0,3).join(', ')}</strong> pro ještě lepší odpovědi Alexe.
    </div>`;
  } else {
    motivText = `<div style="margin-top:12px;font-size:13px;color:var(--success)">✅ Skvělé! Profil je kompletně vyplněn.</div>`;
  }

  _sectionIdx = 0;
  el.innerHTML = `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div style="font-size:14px;font-weight:600">${emoji} Vyplněnost profilu hotelu</div>
        <div style="font-family:var(--font-head);font-size:24px;font-weight:700;color:${color}">${score}%</div>
      </div>
      <div style="background:var(--border);border-radius:6px;height:10px;overflow:hidden">
        <div style="background:${color};height:100%;border-radius:6px;width:${score}%;transition:width .6s ease"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted)">
        <span>Základní údaje: ${d.filled_required}/${d.total_required}</span>
        <span>Bonusové údaje: ${d.filled_bonus}/${d.total_bonus}</span>
      </div>
      ${motivText}
    </div>`;
  translateDom(el);
}

// Accordion sekce se scoring
let _sectionIdx = 0;
let _sectionFields = {}; // uložíme fields pro každou sekci, scoring spočítáme po renderování

function renderSection(icon, title, desc, content, fields, defaultOpen) {
  const id = 'sec-' + (_sectionIdx++);
  // Ulož fields pro pozdější scoring (DOM ještě neexistuje)
  if (fields && fields.length) _sectionFields[id] = fields;
  const isOpen = defaultOpen ? 'open' : '';
  // Placeholder pro score badge – vyplní updateSectionScore() po renderování
  const scorePlaceholder = fields && fields.length
    ? `<span class="section-score" id="score-${id}"><span class="score-badge empty">○ 0%</span></span>`
    : '';
  return `<div class="section ${isOpen ? 'section-open' : ''}" id="${id}">
    <div class="section-head ${isOpen}" onclick="toggleSection('${id}')">
      <div class="section-icon">${icon}</div>
      <div style="flex:1;min-width:0">
        <div class="section-title">${title}</div>
        <div class="section-desc">${desc}</div>
      </div>
      ${scorePlaceholder}
      <span class="section-toggle-lbl">${isOpen ? tr('Sbalit') : tr('Rozbalit')}</span>
      <span class="section-chevron ${isOpen}">▼</span>
    </div>
    <div class="section-body ${isOpen}">${content}</div>
  </div>`;
}

function updateSectionScore(id) {
  const el = document.getElementById('score-' + id);
  if (!el) return;
  const sec = document.getElementById(id);
  const body = sec && sec.querySelector('.section-body');
  if (!body) { el.innerHTML = ''; return; }
  // Spočítej VŠECHNA editovatelná pole v sekci (aby číslo sedělo s řádky)
  let total = 0, filled = 0;
  body.querySelectorAll('input[id^="f-"], textarea[id^="f-"], select[id^="f-"]').forEach(inp => {
    if (inp.type === 'checkbox' || inp.type === 'button' || inp.type === 'hidden') return;
    total++;
    if (String(inp.value || '').trim() !== '') filled++;
  });
  // Tagové skupiny (vybavení, místa v okolí…)
  body.querySelectorAll('[id^="tags-"]').forEach(tc => {
    total++;
    if (tc.querySelectorAll('.tag-item').length > 0) filled++;
  });
  // Opakovatelné restaurace — každá s názvem se počítá jako vyplněná
  body.querySelectorAll('.resto-card').forEach(card => {
    total++;
    const nm = card.querySelector('.r-name');
    if (nm && nm.value.trim()) filled++;
  });
  if (total === 0) { el.innerHTML = ''; return; }
  const pct = Math.round(filled / total * 100);
  // Barvy: 100 % zelená · 80–99 % oranžová · pod 80 % červená
  const cls = pct >= 100 ? 'full' : pct >= 80 ? 'partial' : 'empty';
  const emoji = pct >= 100 ? '✓' : pct >= 80 ? '◑' : '○';
  el.innerHTML = `<span class="score-badge ${cls}" title="${trText('Vyplněno '+filled+' z '+total+' polí')}">${emoji} ${pct}% <span style="opacity:.65;font-weight:500">(${filled}/${total})</span></span>`;
}

function updateAllSectionScores() {
  Object.keys(_sectionFields).forEach(id => updateSectionScore(id));
  buildSidebarNav();
}

function renderRestaurants(list){
  const arr = (list && list.length) ? list : [{}];
  return arr.map((r,i)=>restaurantCard(r,i)).join('');

function collectRestaurants(){
  const out = [];
  document.querySelectorAll('#restaurants-list .resto-card').forEach(card=>{
    const g = s => { const el=card.querySelector(s); return el ? el.value.trim() : ''; };
    const menus = [];
    card.querySelectorAll('.r-menu-row').forEach(mr=>{
      const label = (mr.querySelector('.r-menu-label')||{}).value || 'Jiné';
      const url = ((mr.querySelector('.r-menu-url')||{}).value||'').trim();
      if (url) menus.push({label, url});
    });
    out.push({name:g('.r-name'), type:g('.r-type'), hours:g('.r-hours'), dietary:g('.r-dietary'), directions:g('.r-directions'), menus});
  });
  return out;
}
function rerenderRestaurants(list){
  const c = document.getElementById('restaurants-list');
  if (c) { c.innerHTML = renderRestaurants(list && list.length ? list : [{}]); translateDom(c); }

function removeRestaurant(i){ const list=collectRestaurants(); list.splice(i,1); rerenderRestaurants(list.length?list:[{}]); updateAllSectionScores(); markChanged(); }
function addMenu(btn){ const menus=btn.closest('.resto-card').querySelector('.r-menus'); if(menus){ menus.insertAdjacentHTML('beforeend', menuRow({})); translateDom(menus); markChanged(); } }

function buildSidebarNav() {
  const nav = document.getElementById('sidebar-nav');
  if (!nav) return;
  nav.innerHTML = '';
  // Přidej odkaz na top
  const topLink = document.createElement('a');
  topLink.textContent = tr('⬆ Nahoru');
  topLink.onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});
  nav.appendChild(topLink);
  // Rozbalit / sbalit vše
  const ctl = document.createElement('div');
  ctl.style.cssText = 'display:flex;gap:6px;padding:6px 12px';
  ctl.innerHTML = '<a onclick="setAllSections(true)" title="'+tr('Rozbalit všechny sekce')+'" style="flex:1;justify-content:center;font-size:11px;padding:6px;border:1px solid var(--border);border-radius:6px">'+tr('⊞ Rozbalit vše')+'</a><a onclick="setAllSections(false)" title="'+tr('Sbalit všechny sekce')+'" style="flex:1;justify-content:center;font-size:11px;padding:6px;border:1px solid var(--border);border-radius:6px">'+tr('⊟ Sbalit vše')+'</a>';
  nav.appendChild(ctl);
  // Přidej separátor
  const sep = document.createElement('div');
  sep.className = 'sidebar-section';
  sep.textContent = tr('Sekce profilu');
  nav.appendChild(sep);
  // Najdi všechny sekce
  document.querySelectorAll('.section[id^="sec-"]').forEach(sec => {
    const title = sec.querySelector('.section-title');
    const score = sec.querySelector('.score-badge');
    if (!title) return;
    const a = document.createElement('a');
    const t = title.textContent.trim();
    a.title = t;
    let scoreHtml = '';
    if (score) {
      const col = score.classList.contains('full') ? '#2ecc87' : score.classList.contains('partial') ? '#ffaa33' : '#ff4f6a';
      scoreHtml = '<span style="flex-shrink:0;font-size:11px;font-weight:600;color:' + col + '">' + score.textContent.trim() + '</span>';
    }
    a.innerHTML = '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + t + '</span>' + scoreHtml;
    a.onclick = () => {
      sec.scrollIntoView({behavior: 'smooth', block: 'start'});
      // Otevři sekci pokud je zavřená
      const body = sec.querySelector('.section-body');
      if (body && !body.classList.contains('open')) toggleSection(sec.id);
    };
    nav.appendChild(a);
  });
  // Aktivní sekce při scrollu
  updateActiveSidebarItem();
}

function updateActiveSidebarItem() {
  const sections = document.querySelectorAll('.section[id^="sec-"]');
  const navLinks = document.querySelectorAll('#sidebar-nav a');
  if (!navLinks.length) return;
  let activeIdx = 0;
  sections.forEach((sec, i) => {
    if (sec.getBoundingClientRect().top < 120) activeIdx = i + 1;
  });
  navLinks.forEach((a, i) => a.classList.toggle('active', i === activeIdx));
}

// Sleduj scroll pro aktivní položku v sidebaru
window.addEventListener('scroll', updateActiveSidebarItem, {passive: true});

function toggleSection(id) {
  const sec = document.getElementById(id);
  const head = sec.querySelector('.section-head');
  const body = sec.querySelector('.section-body');
  const chev = sec.querySelector('.section-chevron');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  head.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
  sec.classList.toggle('section-open', !isOpen);
  const lbl = sec.querySelector('.section-toggle-lbl');
  if (lbl) lbl.textContent = !isOpen ? tr('Sbalit') : tr('Rozbalit');
}

function setAllSections(open){
  document.querySelectorAll('.section[id^="sec-"]').forEach(sec => {
    const body = sec.querySelector('.section-body');
    const head = sec.querySelector('.section-head');
    const chev = sec.querySelector('.section-chevron');
    const lbl = sec.querySelector('.section-toggle-lbl');
    if (body) body.classList.toggle('open', open);
    if (head) head.classList.toggle('open', open);
    if (chev) chev.classList.toggle('open', open);
    sec.classList.toggle('section-open', open);
    if (lbl) lbl.textContent = open ? tr('Sbalit') : tr('Rozbalit');
  });
}

// ── Tag input ─────────────────────────────────
function tagsInput(key, items, placeholder) {
  const tagsHtml = items.map(t =>
    `<span class="tag-item" data-val="${esc(t)}">${esc(t)}<button type="button" onclick="removeTag('${key}',this)">×</button></span>`
  ).join('');
  return `<div class="tags-wrap" id="tags-${key}" onclick="document.getElementById('taginput-${key}').focus()">
    ${tagsHtml}
    <input class="tag-input" id="taginput-${key}" placeholder="${esc(placeholder)}" onkeydown="tagKeydown(event,'${key}')">
  </div>`;
}

function initTagInput(key) {
  // Already rendered, just make sure clicks work
}

function tagKeydown(e, key) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,$/, '');
    if (!val) return;
    addTag(key, val);
    e.target.value = '';
    markChanged();
  }
  if (e.key === 'Backspace' && e.target.value === '') {
    const wrap = document.getElementById('tags-' + key);
    const tags = wrap.querySelectorAll('.tag-item');
    if (tags.length) tags[tags.length-1].remove();
    markChanged();
  }
}

function addTag(key, val) {
  const wrap = document.getElementById('tags-' + key);
  const inp = document.getElementById('taginput-' + key);
  const span = document.createElement('span');
  span.className = 'tag-item';
  span.dataset.val = val;
  span.innerHTML = `${esc(val)}<button type="button" onclick="removeTag('${key}',this)">×</button>`;
  wrap.insertBefore(span, inp);
}

function removeTag(key, btn) {
  btn.parentElement.remove();
  markChanged();
}

function getTagValues(key) {
  return [...document.querySelectorAll(`#tags-${key} .tag-item`)].map(t => t.dataset.val);
}

// Cena se načítá z API — neměň ručně
let _pricingBase = 200;
let _pricingThreshold = 100;
let _pricingPerBed = 3;

function calcPrice(beds){
  if(!beds) return _pricingBase;
  return beds <= _pricingThreshold ? _pricingBase : _pricingBase + (beds - _pricingThreshold) * _pricingPerBed;
}

async function loadPricing(){
  try {
    const r = await fetch(`${API}/api/settings`);
    const d = await r.json();
    _pricingBase      = d.pricing_base      || 200;
    _pricingThreshold = d.pricing_threshold || 100;
    _pricingPerBed    = d.pricing_per_bed   || 3;
  } catch(e) { /* fallback na defaults */ }
}

// ── Uložení ───────────────────────────────────
async function saveAll(auto) {
  const numKeys = new Set(['bed_count', 'room_count', 'star_rating']);
  const data = {};
  // Sesbírej VŠECHNA pole f-* genericky (oprava: dřív se ukládala jen ručně vyjmenovaná)
  document.querySelectorAll('input[id^="f-"], textarea[id^="f-"], select[id^="f-"]').forEach(el => {
    if (el.type === 'checkbox' || el.type === 'button' || el.type === 'hidden') return;
    const key = el.id.slice(2);
    const v = String(el.value || '').trim();
    if (numKeys.has(key)) { const n = parseInt(v); data[key] = (v === '' || isNaN(n)) ? null : n; }
    else { data[key] = v || null; }
  });
  data.amenities = getTagValues('amenities');
  data.nearby_places = getTagValues('nearby_places');
  data.hidden_gems = getTagValues('hidden_gems');

  // Opakovatelné restaurace + jídelníky
  const restaurants = collectRestaurants().filter(r => r.name || r.type || r.hours || r.directions || (r.menus && r.menus.length));
  data.restaurants = restaurants;
  // Zpětná kompatibilita (completeness / fallback)
  data.restaurant_name = (restaurants[0] && restaurants[0].name) || null;
  data.nav_restaurant = (restaurants[0] && restaurants[0].directions) || null;
  const allMenus = [];
  restaurants.forEach(r => (r.menus || []).forEach(m => m.url && allMenus.push(m.url)));
  data.menu_urls = allMenus.length ? allMenus : null;

  // Vlastní navigační body
  data.nav_custom = getNavCustomItems().filter(i => i.name || i.desc);

  // Vlastní pole
  const customFields = [];
  let cfIdx = 0;
  while(document.getElementById('cf-label-'+cfIdx)){
    const label = document.getElementById('cf-label-'+cfIdx)?.value.trim();
    const value = document.getElementById('cf-value-'+cfIdx)?.value.trim();
    if(label && value) customFields.push({label, value});
    cfIdx++;
  }
  data.custom_fields = customFields.length ? customFields : null;

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="loader"></span> ' + tr('Ukládá se…');

  try {
    const r = await fetch(`${API}/api/hotel-portal/update?token=${token}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(data)
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    hotelData = d.hotel;
    hasChanges = false;
    document.getElementById('unsaved-dot').classList.remove('show');
    const now = new Date().toLocaleTimeString('cs-CZ', {hour:'2-digit',minute:'2-digit'});
    document.getElementById('last-saved').textContent = `${tr('✓ Uloženo v')} ${now}`;
    // Okamžitá aktualizace platební sekce a hlavičky bez refreshe
    await loadPaymentSection();
    // Přepočítej completeness skóre
    await loadCompleteness();
    const oldBeds = hotelData.subscription_paid_beds || 0;
    const newBeds = hotelData.bed_count || 0;
    if(hotelData.subscription_active && newBeds > oldBeds && oldBeds > 0){
      toast(tr('⚠️ Počet lůžek zvýšen – vyžadován doplatek!'), 'warn');
    } else if(!auto){
      toast(tr('✅ Změny uloženy!'));
    }
  } catch(e) {
    toast(tr('Chyba při ukládání: ') + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.innerHTML = hasChanges ? tr('💾 Uložit teď') : tr('✓ Uloženo');
  }
}

async function savePmsProperty(){
  const el=document.getElementById('pms-prop-input');
  const val=(el?.value||'').trim().toUpperCase();
  if(!val){alert(tr('Zadejte kód property (např. BER)'));return;}
  try{
    const r=await fetch(`${API}/api/hotel-portal/update?token=${token}`,{method:'PATCH',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({pms_property_id:val})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    hotelData.pms_property_id=val;
    loadPmsSection();
  }catch(e){alert(tr('Uložení se nepovedlo: ')+e.message);}
}

async function disconnectPms(){
  if(!confirm(tr('Opravdu odpojit hotelový systém (Apaleo)?\n\nAlex přestane znát pobyty hostů a bude odpovídat jen z profilu hotelu. Připojit ho můžete kdykoli znovu jedním kliknutím.')))return;
  try{
    const r=await fetch(`${API}/api/pms/apaleo/disconnect?token=${token}`,{method:'POST'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    hotelData.pms_type='';
    hotelData.pms_refresh_token='';
    loadPmsSection();
  }catch(e){alert(tr('Odpojení se nepovedlo: ')+e.message);}
}

function obAllFields(){ return OB_STAGES.reduce((a,s)=>a.concat(s.fields),[]); }
function obField(k){ return obAllFields().find(f=>f.k===k); }
function obHasVal(h,f){ return f.arr ? Array.isArray(h[f.k]) && h[f.k].length>0 : !!String(h[f.k]||'').trim(); }
function obShow(h,f){ return f.arr ? (h[f.k]||[]).join(', ') : String(h[f.k]||'').trim(); }
function renderOnboarding(){
  const el=document.getElementById('onboarding-wizard');
  if(!el||!hotelData) return;

  if(localStorage.getItem('sg_ob_hide_'+h.id)==='1'){ el.innerHTML=''; return; }
  const all=obAllFields();
  const filledAll=all.filter(f=>obHasVal(h,f)).length;
  const pctAll=Math.round(filledAll/all.length*100);
  // První nedokončená etapa
  const idx=OB_STAGES.findIndex(s=>s.fields.some(f=>!obHasVal(h,f)));

    el.innerHTML=`<div style="background:linear-gradient(135deg,#0f3d2e,#16a34a);color:#fff;border-radius:14px;padding:20px 22px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">

  }
  const stage=OB_STAGES[idx];
  const stageFilled=stage.fields.filter(f=>obHasVal(h,f)).length;
  const stagePct=Math.round(stageFilled/stage.fields.length*100);
  const stepsBar=OB_STAGES.map((s,i)=>{
    const complete=s.fields.every(f=>obHasVal(h,f));
    const color=complete?'#16a34a':(i===idx?'#ff8a3d':'rgba(255,255,255,.25)');
    return `<span style="flex:1;height:6px;border-radius:3px;background:${color}"></span>`;
  }).join('');

      <span style="font-size:15px">⬜</span>

    </div>`;
  }).join('');
  el.innerHTML=`
    <div style="background:linear-gradient(135deg,#1a1a1a,#2a2a2a);color:#fff;border-radius:14px;padding:20px 22px;margin-bottom:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <div>
          <div style="font-size:16px;font-weight:800">🚀 Průvodce spuštěním <span style="font-size:12px;font-weight:600;opacity:.7">· krok ${idx+1}/${OB_STAGES.length}: ${stage.title}</span></div>

  translateDom(el);

async function saveOb(k, auto){
  const inp=document.getElementById('ob-'+k); if(!inp) return;
  const raw=inp.value.trim();
  if(!raw){ if(!auto){ toast(tr('Vyplňte hodnotu'),'warn'); inp.focus(); } return; }
  const f=obField(k);
  const payloadVal = (f && f.arr) ? raw.split(/[\n,]+/).map(s=>s.trim()).filter(Boolean) : raw;
  try{
    const r=await fetch(`${API}/api/hotel-portal/update?token=${token}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({[k]:payloadVal})});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json(); hotelData=d.hotel;
    if(!(f && f.arr)){ const mainInp=document.getElementById('f-'+k); if(mainInp) mainInp.value=raw; } // sync s velkým formulářem
    const now=new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'});
    const ls=document.getElementById('last-saved'); if(ls) ls.textContent=`${tr('✓ Uloženo v')} ${now}`;
    const b=document.getElementById('save-btn'); if(b) b.innerHTML=tr('✓ Uloženo');
    if(!auto){ toast(tr('Uloženo ✅')); renderOnboarding(); }  // re-render jen při Enter, ať auto-blur nezruší fokus
    if(typeof loadCompleteness==='function') loadCompleteness();
  }catch(e){ if(!auto) toast(tr('Chyba při ukládání'),'error'); }
}
function dismissOnboarding(){
  if(hotelData) localStorage.setItem('sg_ob_hide_'+hotelData.id,'1');
  renderOnboarding();
}

        </div>
        ${hasMonthly ? `
        <div style="background:linear-gradient(135deg,#1a1a1a,#2a2a2a);color:#fff;border-radius:12px;padding:22px;text-align:center;margin-bottom:14px">
          <div style="font-size:44px;font-weight:800;color:#ff8a3d;line-height:1">${rep.count}</div>
          <div style="font-size:13px;opacity:.85;margin-top:2px">${L.conv}${rep.month_label?` · ${rep.month_label}`:''}</div>
          ${trendHtml}
          ${(rep.visitors>0)?`<div style="font-size:13px;opacity:.85;margin-top:6px">👀 <strong>${rep.visitors}</strong> ${L.visitors}</div>`:''}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">${L.langs}</div>
            <div style="font-size:14px;font-weight:600;color:var(--text)">${langsHtml}</div>
          </div>
          <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px">
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">${L.saved}</div>
            <div style="font-size:14px;font-weight:600;color:var(--text)">${rep.saved_label||'–'}</div>
          </div>
        </div>
        ${flaggedHtml}
        ${profileHtml}
        ${curCount>0?`<div style="margin-top:12px;font-size:12px;color:var(--muted);text-align:center">${L.thisMonth}: <strong style="color:var(--text)">${curCount}</strong> ${L.conv}</div>`:''}
        ` : (curCount>0 ? `
        <div style="background:linear-gradient(135deg,#1a1a1a,#2a2a2a);color:#fff;border-radius:12px;padding:22px;text-align:center;margin-bottom:14px">
          <div style="font-size:44px;font-weight:800;color:#ff8a3d;line-height:1">${curCount}</div>
          <div style="font-size:13px;opacity:.85;margin-top:2px">${L.conv} · ${(L.thisMonth||'').toLowerCase()}</div>
        </div>
        ${flaggedHtml}
        ${profileHtml}
        ` : ((cur.visitors||0)>0 ? `
        <div style="background:linear-gradient(135deg,#1a1a1a,#2a2a2a);color:#fff;border-radius:12px;padding:22px;text-align:center;margin-bottom:14px">
          <div style="font-size:44px;font-weight:800;color:#ff8a3d;line-height:1">${cur.visitors}</div>
          <div style="font-size:13px;opacity:.85;margin-top:2px">${L.visitors} · ${(L.thisMonth||'').toLowerCase()}</div>
        </div>
        ${profileHtml}
        ` : `
        <div style="text-align:center;padding:20px 10px;color:var(--muted);font-size:13px">📈 ${L.empty}</div>`))}
        ${allTimeHtml}
      </div>`;
    translateDom(el);
  }catch(e){}
}

async function loadAnalytics(){
  try{
    const r = await fetch(`${API}/api/hotel-portal/analytics?token=${token}`);
    if(!r.ok) return;
    const d = await r.json();
    const a = d.analytics;
    // Zobrazuj analytics vždy, i při 0 chatech

    const TOPIC_LABELS = {
      checkin:'Check-in/out', checkout:'Check-in/out', breakfast:'Snídaně',
      parking:'Parkování', wellness:'Wellness/Spa', restaurant:'Restaurace',
      weather:'Počasí', nearby:'Okolí', contact:'Kontakt'
    };

    // Seřaď témata
    const topics = Object.entries(a.topics||{})
      .sort((x,y)=>y[1]-x[1])
      .slice(0,6);

    const topicHtml = topics.map(([k,v])=>{
      const pct = Math.round((v/a.total)*100);
      return `<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
          <span>${TOPIC_LABELS[k]||k}</span>
          <span style="color:var(--accent2);font-weight:600">${v}x</span>
        </div>
        <div style="background:var(--border);border-radius:4px;height:6px">
          <div style="background:var(--accent);border-radius:4px;height:6px;width:${pct}%"></div>
        </div>
      </div>`;
    }).join('');

    const lastChat = a.last_chat ? new Date(a.last_chat).toLocaleDateString('cs-CZ') : '–';

    // Jen AGREGÁT — konkrétní dotazy hostů nezobrazujeme (soukromí hostů).
    const flaggedCount = a.flagged_count || 0;

    const el = document.getElementById('analytics-section');
    if(!el) return;
    const noDataHtml = a.total === 0 ? `
      <div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">
        📊 Zatím žádné chaty. Data se zobrazí po prvním použití hostem.
      </div>` : '';
    el.innerHTML = `
      <div class="section">
        <div class="section-head">
          <div class="section-icon">📊</div>
          <div><div class="section-title">Statistiky chatbota</div>
          <div class="section-desc">Přehled dotazů vašich hostů</div></div>
        </div>
        ${a.total > 0 ? `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
          <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center">
            <div style="font-size:32px;font-weight:700;color:var(--accent)">${a.total}</div>
            <div style="font-size:12px;color:var(--muted)">Celkem dotazů</div>
          </div>
          <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center">
            <div style="font-size:18px;font-weight:700;color:var(--accent2)">${lastChat}</div>
            <div style="font-size:12px;color:var(--muted)">Poslední chat</div>
          </div>
        </div>
        ${topics.length ? `<div style="font-size:12px;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px">Nejčastější témata</div>${topicHtml}` : ''}
        ${flaggedCount>0 ? `
          <div style="margin-top:18px;padding:12px 14px;border:1px solid rgba(255,79,106,.3);background:rgba(255,79,106,.06);border-radius:8px;font-size:13px;color:var(--text);line-height:1.6">
            ⚠️ Ve <strong style="color:#ff4f6a">${flaggedCount}</strong> případech Alex nejspíš neměl dost informací k odpovědi. Doplňte chybějící údaje v sekcích výše, ať příště odpoví správně.
          </div>` : ''}
        ` : noDataHtml}
      </div>`;
    translateDom(el);
  }catch(e){}
}

// ── Embed widget ─────────────────────────────
function initEmbedCode(){
  const el = document.getElementById('embed-code');
  if(!el || !hotelData) return;
  const base = window.location.origin;
  const code = '<script src="' + base + '/widget.js?hotel_id=' + hotelData.id + '"><\/script>';
  el.textContent = code;
  // Přidej poznámku pokud je ngrok URL
  const note = document.getElementById('embed-note');
  if(note){
    if(base.includes('ngrok')){
      note.textContent = tr('⚠️ Tato URL je dočasná (ngrok). Po nasazení na server použijte produkční URL.');
      note.style.color = 'var(--warn)';
    } else {
      note.textContent = tr('✅ Produkční URL — kód je připraven k použití.');
      note.style.color = 'var(--success)';
    }
  }
}

function copyEmbedCode(){
  const el = document.getElementById('embed-code');
  if(!el) return;
  navigator.clipboard.writeText(el.textContent).then(()=>toast(tr('✅ Kód zkopírován!')));
}

function previewWidget(){
  const base = window.location.origin;
  window.open(`${base}/h/${hotelData.slug||hotelData.id}`, 'sg_preview', 'width=420,height=700');
}

// ── Zrušení předplatného ─────────────────────
async function cancelSubscription(){
  if(!confirm(tr('Zrušit předplatné?\n\nSMARTEST GUIDE poběží až do konce aktuálního zaplaceného období — poté se automaticky ukončí a další platba se NESTRHNE. Ve zkušební době vám nic naúčtováno nebude. Znovu se můžete přihlásit kdykoliv.')))return;
  try{
    const r=await fetch(`${API}/api/hotel-portal/cancel?token=${token}`,{method:'POST'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d.hotel) hotelData=d.hotel;
    toast(d.message||tr('Předplatné bude zrušeno na konci období'),'warn');
    // Obnov celý portál, ať se status přepne na „zrušení naplánováno"
    if(typeof loadHotel==='function'){ loadHotel(); } else { renderPortal(); loadPaymentSection(); }
  }catch(e){toast(tr('Chyba: ')+e.message,'err');}
}

// ── Blokace editace při nedoplatku ───────────
function blockEditing(){
  document.querySelectorAll('input,textarea').forEach(el=>{
    el.disabled=true;
    el.style.opacity='0.4';
    el.style.cursor='not-allowed';
  });
  document.querySelectorAll('.tags-wrap').forEach(el=>{
    el.style.opacity='0.4';
    el.style.pointerEvents='none';
  });
  const btn=document.getElementById('save-btn');
  if(btn){btn.disabled=true;btn.textContent=tr('⚠️ Uhraďte doplatek');}
}

// ── Utils ─────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type='ok'){const e=document.getElementById('toast');e.textContent=msg;e.className='show '+type;setTimeout(()=>e.className='',3500);}
</script>
