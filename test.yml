name: E2E Test po deployi

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalace závislostí
        run: pip install requests

      - name: Restart Railway service (kill 1 přes API)
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { serviceInstanceRedeploy(environmentId: \"${{ secrets.RAILWAY_ENV_ID }}\", serviceId: \"${{ secrets.RAILWAY_SERVICE_ID }}\") }"
            }' && echo "✅ Restart odeslán" || echo "⚠️ Restart selhal"
          sleep 10

      - name: Čekej na novou verzi (max 5 min)
        run: |
          EXPECTED=$(grep 'APP_VERSION' app.py | head -1 | grep -oP '"\K[^"]+')
          echo "Čekám na verzi: $EXPECTED"
          for i in $(seq 1 60); do
            DEPLOYED=$(curl -s https://smartestguide-production.up.railway.app/api/version \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('version',''))" 2>/dev/null || echo "")
            if [ "$DEPLOYED" = "$EXPECTED" ]; then
              echo "✅ Verze $DEPLOYED je live (pokus $i)"
              sleep 3
              break
            fi
            echo "⏳ Pokus $i/60 – live: '$DEPLOYED', čekám na: '$EXPECTED'"
            sleep 5
          done
          DEPLOYED=$(curl -s https://smartestguide-production.up.railway.app/api/version \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('version',''))" 2>/dev/null || echo "")
          if [ "$DEPLOYED" != "$EXPECTED" ]; then
            echo "❌ Timeout — deploy se nedokončil (live: $DEPLOYED, očekáváno: $EXPECTED)"
            exit 1
          fi

      - name: Spusť E2E testy
        run: python test_flow.py

      - name: Výsledek
        if: failure()
        run: echo "❌ Testy selhaly – zkontroluj výstup výše"
