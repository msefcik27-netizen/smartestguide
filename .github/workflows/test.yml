name: E2E Test po deployi

on:
  push:
    branches: [main]
  workflow_dispatch:  # manuální spuštění

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalace závislostí
        run: pip install requests

      - name: Počkej na Railway deploy (10s)
        run: sleep 10

      - name: Spusť E2E testy
        run: python test_flow.py

      - name: Výsledek
        if: failure()
        run: echo "❌ Testy selhaly – zkontroluj výstup výše"
