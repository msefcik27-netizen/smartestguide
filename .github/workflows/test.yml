name: E2E Test po deployi

on:
  push:
    branches: [main]
  workflow_dispatch:  # manuální spuštění

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalace závislostí
        run: pip install requests

      - name: Počkej na Railway deploy (max 3 min)
        run: |
          echo "Čekám až Railway nasadí novou verzi..."
          STATUS="000"
          for i in $(seq 1 36); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://smartestguide-production.up.railway.app/api/settings)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Server odpovídá (pokus $i)"
              sleep 5
              break
            fi
            echo "⏳ Pokus $i/36 – status $STATUS, čekám 5s..."
            sleep 5
          done
          if [ "$STATUS" != "200" ]; then
            echo "❌ Server neodpovídá po 3 minutách"
            exit 1
          fi

      - name: Spusť E2E testy
        run: python test_flow.py

      - name: Výsledek
        if: failure()
        run: echo "❌ Testy selhaly – zkontroluj výstup výše"
